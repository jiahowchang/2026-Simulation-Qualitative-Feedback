<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台 — 擬真訓練</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8; color: #1a202c; min-height: 100vh;
    }

    /* ── Login Screen ── */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12); width: 100%; max-width: 380px; text-align: center;
    }
    .login-card img { height: 56px; margin-bottom: 16px; }
    .login-card h1 { font-size: 1.4rem; color: #2b6cb0; margin-bottom: 6px; }
    .login-card p { font-size: 0.9rem; color: #718096; margin-bottom: 28px; }
    .login-card input[type="password"] {
      width: 100%; padding: 12px 16px; border: 2px solid #cbd5e0; border-radius: 10px;
      font-size: 1rem; outline: none; margin-bottom: 16px; transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: #3182ce; }
    .login-card .login-hint { font-size: 0.82rem; color: #a0aec0; margin-bottom: 16px; min-height: 18px; }
    .btn-login {
      width: 100%; padding: 13px; background: #3182ce; color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: #2b6cb0; }
    .btn-login:disabled { background: #a0aec0; cursor: not-allowed; }

    /* ── App Shell ── */
    .app { display: none; min-height: 100vh; flex-direction: column; }
    .app.show { display: flex; }

    .topbar {
      background: linear-gradient(135deg, #2b6cb0, #3182ce);
      color: #fff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left img { height: 36px; border-radius: 4px; background: rgba(255,255,255,0.15); }
    .topbar-title { font-size: 1.05rem; font-weight: 700; }
    .topbar-subtitle { font-size: 0.75rem; opacity: 0.85; }
    .btn-logout {
      background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4);
      border-radius: 8px; padding: 6px 14px; font-size: 0.85rem; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.3); }

    /* ── Tab Nav ── */
    .tab-nav {
      background: #fff; border-bottom: 2px solid #e2e8f0;
      display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
      position: sticky; top: 0; z-index: 100;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 0 0 auto; padding: 14px 20px; border: none; background: none;
      font-size: 0.9rem; font-weight: 600; color: #718096; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active { color: #2b6cb0; border-bottom-color: #3182ce; }

    /* ── Tab Content ── */
    .tab-content { display: none; padding: 20px 16px 60px; max-width: 900px; margin: 0 auto; width: 100%; }
    .tab-content.active { display: block; }

    /* ── Cards ── */
    .card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .card-title { font-size: 1rem; font-weight: 700; color: #2b6cb0; margin-bottom: 16px; }

    /* ── Progress ── */
    .session-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 12px; overflow: hidden; }
    .session-header {
      padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: background 0.15s;
    }
    .session-header:hover { background: #f7fafc; }
    .session-meta { flex: 1; min-width: 0; }
    .session-name { font-weight: 700; color: #2d3748; font-size: 0.95rem; }
    .session-info { font-size: 0.8rem; color: #718096; margin-top: 2px; }
    .session-stats { font-size: 0.85rem; font-weight: 600; color: #2b6cb0; white-space: nowrap; }
    .progress-bar-wrap { flex: 1; background: #e2e8f0; border-radius: 999px; height: 8px; min-width: 60px; max-width: 120px; }
    .progress-bar-fill { height: 8px; border-radius: 999px; background: linear-gradient(90deg, #3182ce, #63b3ed); transition: width 0.4s; }
    .chevron { font-size: 0.75rem; color: #a0aec0; transition: transform 0.2s; margin-left: 4px; }
    .session-card.open .chevron { transform: rotate(90deg); }

    .session-body { display: none; padding: 0 20px 16px; border-top: 1px solid #e2e8f0; }
    .session-card.open .session-body { display: block; }
    .member-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .member-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: #f7fafc; border-radius: 8px; font-size: 0.88rem;
    }
    .member-status { font-size: 1rem; flex-shrink: 0; }
    .member-name { flex: 1; color: #2d3748; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .member-email { color: #a0aec0; font-size: 0.8rem; flex-shrink: 0; }
    .btn-notify {
      margin-top: 14px; padding: 9px 18px; background: #fff; border: 2px solid #3182ce;
      color: #2b6cb0; border-radius: 8px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-notify:hover { background: #ebf8ff; }
    .btn-notify:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Session Management ── */
    .session-list-item {
      background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 12px; padding: 16px 20px;
    }
    .session-list-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .session-list-group { font-weight: 700; color: #2b6cb0; font-size: 0.95rem; }
    .session-list-detail { font-size: 0.82rem; color: #718096; margin-top: 4px; line-height: 1.7; }
    .btn-delete {
      background: none; border: 1.5px solid #fc8181; color: #e53e3e;
      border-radius: 8px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer;
      font-weight: 600; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-delete:hover { background: #fff5f5; }
    .btn-delete:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-add {
      width: 100%; padding: 14px; background: #3182ce; color: #fff; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s; margin-bottom: 16px;
    }
    .btn-add:hover { background: #2b6cb0; }

    /* ── Feedback Table ── */
    .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-row select, .filter-row input {
      padding: 8px 12px; border: 1.5px solid #cbd5e0; border-radius: 8px;
      font-size: 0.9rem; outline: none; background: #fff; flex: 1; min-width: 120px;
    }
    .filter-row select:focus, .filter-row input:focus { border-color: #3182ce; }
    .table-wrap { overflow-x: auto; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    th {
      background: #ebf8ff; color: #2b6cb0; font-weight: 700; padding: 10px 12px;
      text-align: left; white-space: nowrap;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f7fafc; cursor: pointer; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem;
      font-weight: 600; background: #ebf8ff; color: #2b6cb0;
    }

    /* ── Settings ── */
    .settings-section { max-width: 480px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-weight: 600; font-size: 0.88rem; margin-bottom: 5px; color: #4a5568; }
    .modal-field input, .modal-field select, .modal-field textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid #cbd5e0; border-radius: 8px;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #3182ce; }
    .modal-field textarea { min-height: 70px; resize: vertical; }
    .btn-save {
      padding: 12px 28px; background: #3182ce; color: #fff; border: none;
      border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    .btn-save:hover { background: #2b6cb0; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 500; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto; padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 { font-size: 1.15rem; color: #2b6cb0; margin-bottom: 20px; }
    .member-input-row {
      display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
    }
    .member-input-row input { flex: 1; min-width: 0; }
    .btn-remove-member {
      background: none; border: 1.5px solid #fc8181; color: #e53e3e;
      border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 1rem;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .btn-add-member {
      background: none; border: 1.5px dashed #cbd5e0; color: #718096;
      border-radius: 8px; padding: 8px; width: 100%; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s; margin-top: 4px;
    }
    .btn-add-member:hover { border-color: #3182ce; color: #2b6cb0; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 12px; background: #f7fafc; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #4a5568;
    }
    .btn-confirm {
      flex: 1; padding: 12px; background: #3182ce; color: #fff; border: none;
      border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    .btn-confirm:hover { background: #2b6cb0; }
    .btn-confirm:disabled { background: #a0aec0; cursor: not-allowed; }

    /* Detail modal */
    .detail-meta { background: #f7fafc; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 0.87rem; line-height: 2; }
    .detail-q { margin-bottom: 14px; }
    .detail-q-label { font-size: 0.8rem; font-weight: 700; color: #3182ce; margin-bottom: 4px; }
    .detail-q-ans { font-size: 0.9rem; color: #2d3748; line-height: 1.7; background: #f7fafc; border-radius: 8px; padding: 10px 12px; white-space: pre-wrap; }

    /* ── Loading / Empty ── */
    .loading { text-align: center; padding: 40px; color: #a0aec0; font-size: 0.95rem; }
    .empty { text-align: center; padding: 40px; color: #a0aec0; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-text { font-size: 0.9rem; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      padding: 11px 22px; border-radius: 8px; font-weight: 600; font-size: 0.9rem;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #c6f6d5; color: #276749; }
    .toast.error { background: #fed7d7; color: #822727; }
    .toast.info { background: #ebf8ff; color: #2b6cb0; }

    @media (max-width: 600px) {
      .tab-btn { padding: 12px 14px; font-size: 0.82rem; }
      .modal { padding: 20px 16px; }
      .topbar { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<!-- ══════════ LOGIN SCREEN ══════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="logo.png" alt="Logo">
    <h1>管理後台</h1>
    <p id="loginSubtitle">請輸入管理員密碼</p>
    <input type="password" id="loginPw" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <p class="login-hint" id="loginHint"></p>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- ══════════ MAIN APP ══════════ -->
<div class="app" id="appShell">

  <div class="topbar">
    <div class="topbar-left">
      <img src="logo.png" alt="Logo">
      <div>
        <div class="topbar-title">擬真訓練管理後台</div>
        <div class="topbar-subtitle">2026 Simulation Training</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">登出</button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('progress',this)">📊 進度追蹤</button>
    <button class="tab-btn" onclick="switchTab('sessions',this)">📅 場次管理</button>
    <button class="tab-btn" onclick="switchTab('feedback',this)">💬 回饋資料</button>
    <button class="tab-btn" onclick="switchTab('groups',this)">👥 組別成員</button>
    <button class="tab-btn" onclick="switchTab('settings',this)">⚙️ 設定</button>
  </div>

  <!-- ── Tab 1: 進度追蹤 ── -->
  <div class="tab-content active" id="tab-progress">
    <div id="progressList"><div class="loading">載入中…</div></div>
  </div>

  <!-- ── Tab 2: 場次管理 ── -->
  <div class="tab-content" id="tab-sessions">
    <button class="btn-add" onclick="openAddSession()">＋ 新增場次</button>
    <div id="sessionList"><div class="loading">載入中…</div></div>
  </div>

  <!-- ── Tab 3: 回饋資料 ── -->
  <div class="tab-content" id="tab-feedback">
    <div class="filter-row">
      <select id="filterGroup" onchange="applyFeedbackFilter()">
        <option value="">所有組別</option>
        <option>新竹新人組</option>
        <option>新竹急重症照護組</option>
        <option>新竹新生兒組</option>
        <option>生醫急重症照護組</option>
        <option>生醫新生兒組</option>
        <option>生醫醫事放射組</option>
        <option>桃竹苗競賽生醫重症1組</option>
        <option>桃竹苗競賽生醫重症2組</option>
      </select>
      <input type="date" id="filterDate" onchange="applyFeedbackFilter()">
    </div>
    <div class="table-wrap">
      <table id="feedbackTable">
        <thead>
          <tr>
            <th>送出時間</th><th>組別</th><th>日期</th><th>名字</th><th>職類</th><th>院區</th>
          </tr>
        </thead>
        <tbody id="feedbackTbody">
          <tr><td colspan="6" style="text-align:center;color:#a0aec0;padding:30px;">載入中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Tab: 組別成員 ── -->
  <div class="tab-content" id="tab-groups">
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn-add" onclick="openAddGroupModal()" style="margin-bottom:0;flex:1;min-width:140px;">＋ 新增組別</button>
      <button class="btn-add" onclick="openBatchImportModal()" style="margin-bottom:0;flex:1;min-width:140px;background:#38a169;">📥 批次匯入成員</button>
    </div>
    <div id="unassignedSection"></div>
    <div id="groupsList"><div class="loading">載入中…</div></div>
  </div>

  <!-- ── Tab 4: 設定 ── -->
  <div class="tab-content" id="tab-settings">

    <div class="card settings-section">
      <div class="card-title">📧 固定通知信箱</div>
      <p style="font-size:0.85rem;color:#718096;margin-bottom:14px;line-height:1.6;">
        學員預約新場次時，系統除了寄信給隊員外，也會自動通知以下信箱（講師、助教、行政助理等）。<br>
        多個信箱請用逗號分隔。
      </p>
      <div class="modal-field">
        <label>固定通知信箱</label>
        <textarea id="notifyEmails" placeholder="例：coach@ntuh.gov.tw, admin@ntuh.gov.tw" style="min-height:90px;"></textarea>
      </div>
      <button class="btn-save" onclick="saveNotifyEmails()">儲存信箱設定</button>
    </div>

    <div class="card settings-section">
      <div class="card-title">🔒 變更管理員密碼</div>
      <div class="modal-field">
        <label>目前密碼</label>
        <input type="password" id="curPw" placeholder="輸入目前密碼">
      </div>
      <div class="modal-field">
        <label>新密碼</label>
        <input type="password" id="newPw" placeholder="輸入新密碼">
      </div>
      <div class="modal-field">
        <label>確認新密碼</label>
        <input type="password" id="confirmPw" placeholder="再次輸入新密碼">
      </div>
      <button class="btn-save" onclick="changePassword()">儲存密碼變更</button>
    </div>
  </div>

</div><!-- /.app -->

<!-- ══════════ ADD SESSION MODAL ══════════ -->
<div class="modal-overlay" id="addSessionModal">
  <div class="modal">
    <h2>➕ 新增場次</h2>
    <div class="modal-field">
      <label>組別 *</label>
      <select id="newGroup" onchange="loadGroupMembersAdmin()">
        <option value="">-- 請選擇 --</option>
        <option>新竹新人組</option>
        <option>新竹急重症照護組</option>
        <option>新竹新生兒組</option>
        <option>生醫急重症照護組</option>
        <option>生醫新生兒組</option>
        <option>生醫醫事放射組</option>
        <option>桃竹苗競賽生醫重症1組</option>
        <option>桃竹苗競賽生醫重症2組</option>
      </select>
    </div>
    <div class="modal-field">
      <label>日期 *</label>
      <input type="date" id="newDate">
    </div>
    <div class="modal-field">
      <label>時間</label>
      <input type="text" id="newTime" placeholder="例：15:30–16:30">
    </div>
    <div class="modal-field">
      <label>地點</label>
      <input type="text" id="newLocation" placeholder="例：急診教育訓練室">
    </div>
    <div class="modal-field">
      <label>教練</label>
      <input type="text" id="newCoach" placeholder="教練姓名">
    </div>
    <div class="modal-field">
      <label>助教</label>
      <input type="text" id="newTA" placeholder="助教姓名">
    </div>
    <div class="modal-field">
      <label>值日生</label>
      <input type="text" id="newDuty" placeholder="值日生姓名">
    </div>
    <div class="modal-field">
      <label>備注</label>
      <textarea id="newNote" placeholder="備注（選填）"></textarea>
    </div>
    <div class="modal-field">
      <label>成員名單（姓名 + Email）</label>
      <div id="memberRows"></div>
      <button class="btn-add-member" onclick="addMemberRow()">＋ 新增成員</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addSessionModal')">取消</button>
      <button class="btn-confirm" id="confirmAddBtn" onclick="submitAddSession()">新增場次</button>
    </div>
  </div>
</div>

<!-- ══════════ ADD GROUP MODAL ══════════ -->
<div class="modal-overlay" id="addGroupModal">
  <div class="modal">
    <h2>➕ 新增組別</h2>
    <div class="modal-field">
      <label>組別名稱 *</label>
      <input type="text" id="newGroupName" placeholder="例：新竹新人組">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addGroupModal')">取消</button>
      <button class="btn-confirm" onclick="submitAddGroup()">新增</button>
    </div>
  </div>
</div>

<!-- ══════════ BATCH IMPORT MEMBERS MODAL ══════════ -->
<div class="modal-overlay" id="batchImportModal">
  <div class="modal">
    <h2>📥 批次匯入成員</h2>
    <div class="modal-field">
      <label>目標組別 *</label>
      <select id="batchTargetGroup"></select>
    </div>
    <div class="modal-field">
      <label>成員清單 *</label>
      <p style="font-size:0.8rem;color:#718096;margin-bottom:6px;">每行一人，格式可為：<code>姓名 email</code> 或 <code>姓名[tab]email</code>，重複的會自動略過</p>
      <textarea id="batchMembersText" placeholder="陳小明 example@gmail.com&#10;王大華 wang@hch.gov.tw&#10;李美麗 lee@gmail.com" style="min-height:200px;font-family:monospace;font-size:0.85rem;"></textarea>
    </div>
    <div class="modal-actions">

<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxry8msOCgkK26qbveQbxpZ-TTXp1y1Ps3kjHBz6QmshndyVSpFduoZdgk9UwQx4GoT/exec';
  var adminPassword = '';
  var allFeedback = [];
  var allSessions = [];
  var cbIndex = 0;
  var autoRefreshTimer = null;
  var currentTab = 'progress';
  var REFRESH_INTERVAL_MS = 30000; // 30 秒自動刷新

  /* ── JSONP helper ── */
  function jsonp(params, cb) {
    var name = '__cb' + (cbIndex++);
    var s = document.createElement('script');
    window[name] = function(data) {
      delete window[name];
      if (document.head.contains(s)) document.head.removeChild(s);
      cb(null, data);
    };
    params.callback = name;
    var qs = Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    s.src = GAS_URL + '?' + qs;
    s.onerror = function() {
      delete window[name];
      if (document.head.contains(s)) document.head.removeChild(s);
      cb(new Error('JSONP error'));
    };
    document.head.appendChild(s);
  }

  /* ── Toast ── */
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'info');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3200);
  }

  /* ── Login / Logout ── */
  function doLogin() {
    var pw = document.getElementById('loginPw').value.trim();
    if (!pw) { document.getElementById('loginHint').textContent = '請輸入密碼'; return; }
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '驗證中…';
    document.getElementById('loginHint').textContent = '';

    jsonp({ action: 'getSessions', password: pw }, function(err, data) {
      btn.disabled = false; btn.textContent = '登入';
      if (err) {
        document.getElementById('loginHint').textContent = '連線失敗，請重試';
        return;
      }
      if (data && data.error === 'unauthorized') {
        document.getElementById('loginHint').textContent = '密碼錯誤，請重試';
        return;
      }
      adminPassword = pw;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').classList.add('show');
      refreshGroupMembers(function(){ loadProgress(); });
      startIdleTimer();
      startAutoRefresh();
    });
  }

  function doLogout(reason) {
    adminPassword = '';
    stopIdleTimer();
    stopAutoRefresh();
    document.getElementById('loginPw').value = '';
    document.getElementById('loginHint').textContent = reason === 'idle' ? '閒置超過 1 小時，已自動登出' : '';
    document.getElementById('appShell').classList.remove('show');
    document.getElementById('loginScreen').style.display = 'flex';
  }

  /* ── 閒置自動登出（1 小時）── */
  var IDLE_TIMEOUT_MS = 60 * 60 * 1000; // 1 小時
  var idleTimer = null;
  var lastActivity = 0;

  function resetIdleTimer() { lastActivity = Date.now(); }

  function startIdleTimer() {
    resetIdleTimer();
    stopIdleTimer();
    ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(function(ev){
      document.addEventListener(ev, resetIdleTimer, true);
    });
    idleTimer = setInterval(function() {
      if (Date.now() - lastActivity >= IDLE_TIMEOUT_MS) {
        doLogout('idle');
      }
    }, 30000); // 每 30 秒檢查一次
  }

  function stopIdleTimer() {
    if (idleTimer) { clearInterval(idleTimer); idleTimer = null; }
    ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(function(ev){
      document.removeEventListener(ev, resetIdleTimer, true);
    });
  }

  /* ── Tab switching ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    currentTab = name;
    if (name === 'progress') loadProgress();
    if (name === 'sessions') loadSessions();
    if (name === 'feedback') loadFeedback();
    if (name === 'groups')   loadGroups();
    if (name === 'settings') loadNotifyEmails();
    startAutoRefresh();
  }

  /* ── Auto Refresh ── */
  function startAutoRefresh() {
    stopAutoRefresh();
    if (currentTab !== 'progress' && currentTab !== 'feedback') return;
    autoRefreshTimer = setInterval(function() {
      if (document.hidden) return; // 頁面在背景時不刷新
      if (document.querySelector('.modal-overlay.show')) return; // 有開啟對話框時不刷新
      if (currentTab === 'progress') loadProgress(true);
      else if (currentTab === 'feedback') loadFeedback(true);
    }, REFRESH_INTERVAL_MS);
  }

  function stopAutoRefresh() {
    if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  }

  /* ── Modal helpers ── */
  function openModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('show');

  /* ── Tab 1: Progress Tracking ── */
  function loadProgress(silent) {
    var el = document.getElementById('progressList');
    if (!silent) el.innerHTML = '<div class="loading">載入中…</div>';
    jsonp({ action: 'getProgress', password: adminPassword }, function(err, data) {
      if (err || !data || data.error) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">載入失敗，請重新整理</div></div>';
        return;
      }
      if (!data.sessions || data.sessions.length === 0) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">尚無場次資料</div></div>';
        return;
      }
      var html = '';
      data.sessions.forEach(function(s) {
        var pct = s.total > 0 ? Math.round(s.filled / s.total * 100) : 0;
        var membersHtml = '';
        if (s.members && s.members.length) {
          s.members.forEach(function(m) {
            membersHtml += '<div class="member-row">' +
              '<span class="member-status">' + (m.filled ? '✅' : '❌') + '</span>' +
              '<span class="member-name">' + esc(m.name) + '</span>' +
              '<span class="member-email">' + esc(m.email) + '</span>' +
            '</div>';
          });
        } else {
          membersHtml = '<div style="color:#a0aec0;font-size:0.85rem;padding:8px 0;">尚無成員名單</div>';
        }
        var sid = esc(s.session_id);
        html += '<div class="session-card" id="sc-' + sid + '">' +
          '<div class="session-header" onclick="toggleSession(\'' + sid + '\')">' +
            '<div class="session-meta">' +
              '<div class="session-name">' + esc(s.group) + '</div>' +
              '<div class="session-info">' + esc(s.date) + (s.time ? ' ' + esc(s.time) : '') + '</div>' +
            '</div>' +
            '<div class="progress-bar-wrap">' +
              '<div class="progress-bar-fill" style="width:' + pct + '%"></div>' +
            '</div>' +
            '<div class="session-stats">' + s.filled + '/' + s.total + '</div>' +
            '<span class="chevron">&#9654;</span>' +
          '</div>' +
          '<div class="session-body">' +
            '<div class="member-list">' + membersHtml + '</div>' +
            '<button class="btn-notify" onclick="sendNotify(\'' + sid + '\',this)">發送提醒 📧</button>' +

    });

    var card = document.getElementById('sc-' + id);
    if (card) card.classList.toggle('open');

  function sendNotify(sessionId, btn) {
    btn.disabled = true; btn.textContent = '發送中…';

  /* ── Tab 2: Session Management ── */
  function loadSessions() {
    var el = document.getElementById('sessionList');
    el.innerHTML = '<div class="loading">載入中…</div>';
    jsonp({ action: 'getSessions', password: adminPassword }, function(err, data) {
      if (err || !data || data.error) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">載入失敗</div></div>';
        return;
      }
      allSessions = data.sessions || [];
      if (allSessions.length === 0) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">尚無場次，請點上方按鈕新增</div></div>';
        return;
      }
      // 拆成「即將到來」與「已完成」
      var today = new Date(); today.setHours(0,0,0,0);
      var upcoming = [], past = [];
      allSessions.forEach(function(s) {
        var d = s.date ? new Date(s.date) : null;
        if (d) d.setHours(0,0,0,0);
        if (d && d < today) past.push(s);
        else upcoming.push(s);
      });
      upcoming.sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });
      past.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

      function renderSessionCard(s, isPast) {
        var members = [];
        try { members = typeof s.members === 'string' ? JSON.parse(s.members) : (s.members || []); } catch(e) {}
        if (members.length === 0 && GROUP_MEMBERS[s.group]) {
          members = GROUP_MEMBERS[s.group].slice();
        }
        var sid = esc(s.session_id);
        var details = [];
        if (s.date)     details.push(esc('📅 ' + s.date));
        if (s.time)     details.push(esc('⏰ ' + s.time));
        if (s.location) details.push(esc('📍 ' + s.location));
        if (s.coach)    details.push(esc('👨‍🏫 教練：' + s.coach));
        if (s.ta)       details.push(esc('🧑‍💼 助教：' + s.ta));
        if (s.duty)     details.push(esc('🔧 值日：' + s.duty));
        if (members.length) {
          details.push('<a href="javascript:void(0)" onclick="toggleSessionMembers(\'' + sid + '\')" style="color:#2b6cb0;text-decoration:underline;cursor:pointer;">👥 ' + members.length + ' 人</a>');
        }
        if (s.note)     details.push(esc('📝 ' + s.note));

        var memberListHtml = members.length ? members.map(function(m){
          return '<div class="member-row">' +
            '<span class="member-name">' + esc(m.name || '') + '</span>' +
            '<span class="member-email">' + esc(m.email || '') + '</span>' +
          '</div>';
        }).join('') : '';

        var doneBadge = isPast ? '<span style="display:inline-block;background:#e6fffa;color:#234e52;border:1px solid #b2f5ea;border-radius:999px;padding:2px 10px;font-size:0.75rem;font-weight:700;margin-left:8px;vertical-align:middle;">✓ 已完成</span>' : '';
        var cardStyle = isPast ? 'opacity:0.7;' : '';

        return '<div class="session-list-item" style="' + cardStyle + '">' +
          '<div class="session-list-header">' +
            '<div style="min-width:0;">' +
              '<div class="session-list-group">' + esc(s.group) + doneBadge + '</div>' +
              '<div class="session-list-detail">' + details.join('　') + '</div>' +
            '</div>' +
            '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">' +
              '<button class="btn-notify" style="margin-top:0;padding:6px 12px;font-size:0.82rem;" onclick="openEditSession(\'' + sid + '\')">編輯</button>' +
              '<button class="btn-delete" onclick="deleteSession(\'' + sid + '\',this)">刪除</button>' +
            '</div>' +
          '</div>' +
          (memberListHtml ? '<div id="sm-' + sid + '" class="member-list" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0;">' + memberListHtml + '</div>' : '') +
        '</div>';
      }

      var sectionStyle = 'font-size:0.85rem;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:0.08em;margin:18px 0 10px;display:flex;align-items:center;gap:10px;';
      var dividerStyle = 'flex:1;height:1px;background:#e2e8f0;';

      var html = '';
      if (upcoming.length) {
        html += '<div style="' + sectionStyle + '">📅 即將到來<span style="' + dividerStyle + '"></span></div>';
        upcoming.forEach(function(s){ html += renderSessionCard(s, false); });
      }
      if (past.length) {
        html += '<div style="' + sectionStyle + 'margin-top:28px;">✓ 已完成<span style="' + dividerStyle + '"></span></div>';
        past.forEach(function(s){ html += renderSessionCard(s, true); });
      }
      el.innerHTML = html;
    });
  }

  function toggleSessionMembers(sid) {
    var el = document.getElementById('sm-' + sid);
    if (el) el.style.display = el.style.display === 'none' ? 'flex' : 'none';
  }

  function deleteSession(id, btn) {

  function loadGroups() {

    refreshGroupMembers(function() {

  function renderUnassignedSection(feedbackRows) {
    var assignedEmails = {};
    var assignedNames = {};
    Object.keys(GROUP_MEMBERS).forEach(function(g) {
      (GROUP_MEMBERS[g] || []).forEach(function(m) {
        if (m.email) assignedEmails[m.email.toLowerCase().trim()] = true;
        if (m.name) assignedNames[m.name.trim()] = true;
      });
    });

    var seen = {};
    unassignedCache = [];
    feedbackRows.forEach(function(r) {
      var email  = String(r['Email'] || r['email'] || '').toLowerCase().trim();
      var name   = String(r['名字'] || r['name'] || '').trim();
      var campus = String(r['院區'] || r['campus'] || '').trim();
      var group  = String(r['組別'] || r['group'] || '').trim();
      if (!email && !name) return;
      var key = email || ('n:' + name);
      if (seen[key]) return;
      seen[key] = true;
      if (email && assignedEmails[email]) return;
      if (name && assignedNames[name]) return;
      unassignedCache.push({ name: name, email: email, campus: campus, group: group });
    });

    var el = document.getElementById('unassignedSection');
    if (unassignedCache.length === 0) {
      el.innerHTML = '';
      return;
    }

    var groupOpts = '<option value="">-- 指派到 --</option>' +
      Object.keys(GROUP_MEMBERS).map(function(g){ return '<option>' + esc(g) + '</option>'; }).join('');

    var rowsHtml = unassignedCache.map(function(p, i){

        '<select id="assign-' + i + '" style="padding:5px 8px;border:1px solid #cbd5e0;border-radius:6px;font-size:0.85rem;">' + groupOpts + '</select>' +
        '<button class="btn-notify" style="margin-top:0;padding:5px 12px;font-size:0.8rem;" onclick="assignUnassigned(' + i + ')">指派</button>' +
      '</div>';

  function assignUnassigned(idx) {

    if (!p) return;

    var group = sel.value;
    if (!group) { showToast('請選擇組別', 'error'); return; }

    GROUP_MEMBERS[group].push({ name: p.name, email: p.email });
    saveAllGroups(function(ok){
      if (ok) {
        showToast('已將 ' + (p.name || p.email) + ' 指派到 ' + group, 'success');
        loadGroups();
      }
    });
  }

  /* ── 批次匯入 ── */
  function openBatchImportModal() {
    var sel = document.getElementById('batchTargetGroup');
    sel.innerHTML = '<option value="">-- 請選擇組別 --</option>' +
      Object.keys(GROUP_MEMBERS).map(function(g){ return '<option>' + esc(g) + '</option>'; }).join('');
    document.getElementById('batchMembersText').value = '';
    openModal('batchImportModal');
  }

  function submitBatchImport() {
    var group = document.getElementById('batchTargetGroup').value;
    if (!group) { showToast('請選擇目標組別', 'error'); return; }
    var text = document.getElementById('batchMembersText').value.trim();
    if (!text) { showToast('請貼上成員資料', 'error'); return; }

    var existing = (GROUP_MEMBERS[group] || []).slice();
    var existingEmails = {};
    var existingNames = {};
    existing.forEach(function(m){
      if (m.email) existingEmails[m.email.toLowerCase().trim()] = true;
      if (m.name) existingNames[m.name.trim()] = true;
    });

    var added = 0, skipped = 0;
    text.split('\n').forEach(function(line) {
      line = line.trim();
      if (!line) return;
      var parts = line.split(/[\t ,，]+/).filter(Boolean);
      var name = '', email = '';
      for (var i = parts.length - 1; i >= 0; i--) {
        if (parts[i].indexOf('@') >= 0) {
          email = parts[i];
          parts.splice(i, 1);
          break;
        }
      }
      name = parts.join(' ').trim();
      if (!name && !email) return;
      if (email && existingEmails[email.toLowerCase()]) { skipped++; return; }
      if (!email && name && existingNames[name]) { skipped++; return; }
      existing.push({ name: name, email: email });
      if (email) existingEmails[email.toLowerCase()] = true;
      if (name) existingNames[name] = true;
      added++;
    });

    if (added === 0) { showToast('沒有新成員可匯入', 'error'); return; }

    GROUP_MEMBERS[group] = existing;
    saveAllGroups(function(ok){
      if (ok) {
        closeModal('batchImportModal');
        showToast('已匯入 ' + added + ' 人' + (skipped ? '（略過重複 ' + skipped + '）' : ''), 'success');
        loadGroups();
      }
    });
  }

  function renderGroups() {
    var el = document.getElementById('groupsList');
    var names = Object.keys(GROUP_MEMBERS);
    if (names.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">尚無組別，點上方按鈕新增</div></div>';
      return;
    }
    var html = '';
    names.forEach(function(g) {
      var mems = GROUP_MEMBERS[g] || [];
      var memHtml = mems.length ? mems.map(function(m){
        return '<div class="member-row"><span class="member-name">' + esc(m.name||'') + '</span><span class="member-email">' + esc(m.email||'') + '</span></div>';
      }).join('') : '<div style="color:#a0aec0;font-size:0.85rem;padding:8px 0;">尚無成員</div>';
      html += '<div class="session-list-item">' +
        '<div class="session-list-header">' +
          '<div style="min-width:0;flex:1;">' +
            '<div class="session-list-group">' + esc(g) + ' <span style="color:#718096;font-weight:500;font-size:0.85rem;">(' + mems.length + ' 人)</span></div>' +
            '<div class="member-list" style="margin-top:10px;">' + memHtml + '</div>' +
          '</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">' +
            '<button class="btn-notify" style="margin-top:0;padding:6px 12px;font-size:0.82rem;" onclick="openEditGroupModal(\'' + esc(g).replace(/\\/g,'\\\\').replace(/\x27/g,"\\\x27") + '\')">編輯成員</button>' +
            '<button class="btn-delete" onclick="deleteGroup(\'' + esc(g).replace(/\\/g,'\\\\').replace(/\x27/g,"\\\x27") + '\')">刪除</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    el.innerHTML = html;
  }

  function openAddGroupModal() {
    document.getElementById('newGroupName').value = '';
    openModal('addGroupModal');
  }

  function submitAddGroup() {
    var name = document.getElementById('newGroupName').value.trim();
    if (!name) { showToast('請輸入組別名稱', 'error'); return; }
    if (GROUP_MEMBERS[name]) { showToast('此組別已存在', 'error'); return; }
    GROUP_MEMBERS[name] = [];
    saveAllGroups(function(ok){
      if (ok) {
        closeModal('addGroupModal');
        showToast('已新增組別 ✅', 'success');
        renderGroups();
      }
    });
  }

  function openEditGroupModal(groupName) {
    editingGroupName = groupName;
    document.getElementById('editGroupTitle').textContent = '編輯成員 — ' + groupName;
    var container = document.getElementById('editMemberRows');
    container.innerHTML = '';
    var mems = GROUP_MEMBERS[groupName] || [];
    if (mems.length === 0) {
      addEditMemberRow();
    } else {
      mems.forEach(function(m){ addEditMemberRow(m.name, m.email); });
    }
    openModal('editGroupModal');
  }

  function addEditMemberRow(name, email) {
    var row = document.createElement('div');
    row.className = 'member-input-row';
    row.innerHTML =
      '<input type="text" placeholder="姓名" value="' + esc(name||'') + '">' +
      '<input type="email" placeholder="Email" value="' + esc(email||'') + '">' +
      '<button class="btn-remove-member" onclick="this.parentNode.remove()">&#215;</button>';
    document.getElementById('editMemberRows').appendChild(row);
  }

  function submitEditGroup() {
    if (!editingGroupName) return;
    var mems = [];
    document.querySelectorAll('#editMemberRows .member-input-row').forEach(function(row){
      var inputs = row.querySelectorAll('input');
      var n = inputs[0].value.trim();
      var e = inputs[1].value.trim();
      if (n || e) mems.push({ name: n, email: e });
    });
    GROUP_MEMBERS[editingGroupName] = mems;
    saveAllGroups(function(ok){
      if (ok) {
        closeModal('editGroupModal');
        showToast('已更新成員 ✅', 'success');
        renderGroups();
      }
    });
  }

  function deleteGroup(groupName) {
    if (!confirm('確定刪除「' + groupName + '」組別及其所有成員？')) return;
    delete GROUP_MEMBERS[groupName];
    saveAllGroups(function(ok){
      if (ok) {
        showToast('已刪除組別', 'success');
        renderGroups();
      }
    });
  }

  function saveAllGroups(cb) {
    jsonp({
      action: 'saveGroupMembers',
      password: adminPassword,
      groups: JSON.stringify(GROUP_MEMBERS)
    }, function(err, data) {
      if (err || (data && data.error)) {
        showToast('儲存失敗：' + (data && data.error ? data.error : '請重試'), 'error');
        if (cb) cb(false);
      } else {
        if (cb) cb(true);
      }
    });
  }

  function loadGroupMembersAdmin() {
    var group = document.getElementById('newGroup').value;
    var container = document.getElementById('memberRows');
    container.innerHTML = '';
    var members = GROUP_MEMBERS[group] || [];
    if (members.length > 0) {
      members.forEach(function(m) {
        var row = document.createElement('div');
        row.className = 'member-input-row';
        row.innerHTML =
          '<input type="text" placeholder="姓名" value="' + esc(m.name) + '">' +
          '<input type="email" placeholder="Email" value="' + esc(m.email) + '">' +
          '<button class="btn-remove-member" onclick="this.parentNode.remove()">&#215;</button>';
        container.appendChild(row);
      });
    } else {
      addMemberRow();
    }
  }

  /* ── Add / Edit Session Modal ── */
  var editingSessionId = '';

  function openAddSession() {
    editingSessionId = '';
    ['newGroup','newTime','newLocation','newCoach','newTA','newDuty','newNote'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('newDate').value = '';
    document.getElementById('memberRows').innerHTML = '';
    addMemberRow();
    // 修改 modal 標題與按鈕
    var modalH2 = document.querySelector('#addSessionModal h2');
    if (modalH2) modalH2.textContent = '➕ 新增場次';
    document.getElementById('confirmAddBtn').textContent = '新增場次';
    openModal('addSessionModal');
  }

  function openEditSession(sid) {
    var s = null;
    for (var i = 0; i < allSessions.length; i++) {
      if (String(allSessions[i].session_id) === String(sid)) { s = allSessions[i]; break; }
    }
    if (!s) { showToast('找不到場次', 'error'); return; }
    editingSessionId = sid;

    document.getElementById('newGroup').value    = s.group || '';
    document.getElementById('newDate').value     = s.date  || '';
    document.getElementById('newTime').value     = s.time  || '';
    document.getElementById('newLocation').value = s.location || '';
    document.getElementById('newCoach').value    = s.coach || '';
    document.getElementById('newTA').value       = s.ta    || '';
    document.getElementById('newDuty').value     = s.duty  || '';
    document.getElementById('newNote').value     = s.note  || '';

    // 載入成員
    document.getElementById('memberRows').innerHTML = '';
    var mems = [];
    try { mems = typeof s.members === 'string' ? JSON.parse(s.members) : (s.members || []); } catch(e) {}
    if (mems.length === 0) {
      addMemberRow();
    } else {
      mems.forEach(function(m) {
        var row = document.createElement('div');
        row.className = 'member-input-row';
        row.innerHTML =
          '<input type="text" placeholder="姓名" value="' + esc(m.name||'') + '">' +
          '<input type="email" placeholder="Email" value="' + esc(m.email||'') + '">' +
          '<button class="btn-remove-member" onclick="this.parentNode.remove()">&#215;</button>';
        document.getElementById('memberRows').appendChild(row);
      });
    }

    var modalH2 = document.querySelector('#addSessionModal h2');
    if (modalH2) modalH2.textContent = '✏️ 編輯場次';
    document.getElementById('confirmAddBtn').textContent = '儲存變更';
    openModal('addSessionModal');
  }

  function addMemberRow() {
    var row = document.createElement('div');
    row.className = 'member-input-row';
    row.innerHTML =
      '<input type="text" placeholder="姓名">' +
      '<input type="email" placeholder="Email">' +
      '<button class="btn-remove-member" onclick="this.parentNode.remove()">&#215;</button>';
    document.getElementById('memberRows').appendChild(row);
  }

  function submitAddSession() {
    var group = document.getElementById('newGroup').value;
    var date  = document.getElementById('newDate').value;
    if (!group) { showToast('請選擇組別', 'error'); return; }
    if (!date)  { showToast('請選擇日期', 'error'); return; }

    var members = [];
    document.querySelectorAll('#memberRows .member-input-row').forEach(function(row) {
      var inputs = row.querySelectorAll('input');
      var name  = inputs[0].value.trim();
      var email = inputs[1].value.trim();
      if (name || email) members.push({ name: name, email: email });
    });

    var btn = document.getElementById('confirmAddBtn');
    var isEdit = !!editingSessionId;
    var origText = isEdit ? '儲存變更' : '新增場次';
    btn.disabled = true; btn.textContent = isEdit ? '儲存中…' : '新增中…';

    var params = {
      action: isEdit ? 'updateSession' : 'addSession',
      password: adminPassword,
      group: group,
      date: date,
      time: document.getElementById('newTime').value,
      location: document.getElementById('newLocation').value,
      coach: document.getElementById('newCoach').value,
      ta: document.getElementById('newTA').value,
      duty: document.getElementById('newDuty').value,
      note: document.getElementById('newNote').value,
      members: JSON.stringify(members)
    };
    if (isEdit) params.session_id = editingSessionId;

    jsonp(params, function(err, data) {
      btn.disabled = false; btn.textContent = origText;
      if (err || (data && data.error)) {
        showToast((isEdit?'更新':'新增') + '失敗：' + (data && data.error ? data.error : '請重試'), 'error');
      } else {
        showToast((isEdit?'場次已更新':'場次已新增') + ' ✅', 'success');
        closeModal('addSessionModal');
        loadSessions();
      }
    });
  }

  /* ── Tab 3: Feedback ── */
  var QUESTION_LABELS = [
    'Q1 能幫助學習的訓練元素',
    'Q2 阻礙學習的因素',
    'Q3 團隊合作最有效行為',
    'Q4 需改善的 TRM 行為',
    'Q5 Debriefing 最能改變行為的回饋',
    'Q6 第二次演練實際改變',
    'Q7 未說出的疑慮',
    'Q8 轉移至真實臨床'
  ];

  function loadFeedback(silent) {
    var tbody = document.getElementById('feedbackTbody');
    if (!silent) tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#a0aec0;padding:30px;">載入中…</td></tr>';
    jsonp({ action: 'getFeedback', password: adminPassword }, function(err, data) {
      if (err || !data || data.error) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#e53e3e;padding:30px;">載入失敗</td></tr>';
        return;
      }
      allFeedback = data.rows || [];
      applyFeedbackFilter();
    });
  }

  function applyFeedbackFilter() {
    var fg = document.getElementById('filterGroup').value;
    var fd = document.getElementById('filterDate').value;
    var rows = allFeedback.filter(function(r) {
      if (fg && r['組別'] !== fg) return false;
      if (fd && r['訓練日期'] !== fd) return false;
      return true;
    });
    renderFeedbackTable(rows);
  }

  function renderFeedbackTable(rows) {
    var tbody = document.getElementById('feedbackTbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#a0aec0;padding:30px;">尚無資料</td></tr>';
      return;
    }
    // Store a safe reference for click
    window._fbRows = rows;
    var html = '';
    rows.forEach(function(r, i) {
      html += '<tr onclick="openFeedbackDetail(' + i + ')">' +
        '<td>' + esc(r['送出時間'] || '') + '</td>' +
        '<td><span class="badge">' + esc(r['組別'] || '') + '</span></td>' +
        '<td>' + esc(r['訓練日期'] || '') + '</td>' +
        '<td>' + esc(r['名字'] || '') + '</td>' +
        '<td>' + esc(r['職類'] || '') + '</td>' +
        '<td>' + esc(r['院區'] || '') + '</td>' +
      '</tr>';
    });
    tbody.innerHTML = html;
  }

  function openFeedbackDetail(idx) {
    var r = window._fbRows[idx];
    if (!r) return;
    var group = r['組別'] || '';
    var name  = r['名字'] || '';
    var date  = r['訓練日期'] || '';
    document.getElementById('detailTitle').textContent = group + (name ? ' — ' + name : '') + (date ? ' (' + date + ')' : '');

    var metaFields = ['職類','臨床工作年資','院區','Email','A-C-L-S分工站位','擬真訓練經驗'];
    var metaHtml = '<div class="detail-meta">';
    metaFields.forEach(function(f) {
      if (r[f]) metaHtml += '<b>' + esc(f) + '：</b>' + esc(r[f]) + '<br>';
    });
    metaHtml += '</div>';

    var qKeys = [
      'Q1-幫助學習的訓練元素','Q2-阻礙學習的因素','Q3-團隊合作最有效行為','Q4-需改善TRM行為',
      'Q5-Debriefing最能改變行為的回饋','Q6-第二次演練實際改變','Q7-未說出的疑慮','Q8-轉移至真實臨床'
    ];
    var qHtml = '';
    qKeys.forEach(function(k, i) {
      qHtml += '<div class="detail-q">' +
        '<div class="detail-q-label">' + esc(QUESTION_LABELS[i]) + '</div>' +
        '<div class="detail-q-ans">' + esc(r[k] || '（未填）') + '</div>' +
      '</div>';
    });

    document.getElementById('detailBody').innerHTML = metaHtml + qHtml;
    openModal('feedbackDetailModal');
  }

  /* ── Tab 4: Settings ── */
  function loadNotifyEmails() {
    jsonp({ action: 'getNotifyEmails', password: adminPassword }, function(err, data) {
      if (!err && data && data.emails != null) {
        document.getElementById('notifyEmails').value = data.emails;
      }
    });
  }

  function saveNotifyEmails() {
    var emails = document.getElementById('notifyEmails').value.trim();
    jsonp({ action: 'setNotifyEmails', password: adminPassword, emails: emails }, function(err, data) {
      if (err || (data && data.error)) {
        showToast('儲存失敗，請重試', 'error');
      } else {
        showToast('通知信箱已儲存 ✅', 'success');
      }
    });
  }

  function changePassword() {
    var cur  = document.getElementById('curPw').value.trim();
    var nw   = document.getElementById('newPw').value.trim();
    var conf = document.getElementById('confirmPw').value.trim();
    if (!cur || !nw || !conf) { showToast('請填寫所有欄位', 'error'); return; }
    if (cur !== adminPassword) { showToast('目前密碼不正確', 'error'); return; }
    if (nw !== conf)  { showToast('新密碼與確認密碼不符', 'error'); return; }
    if (nw.length < 4) { showToast('新密碼至少需 4 個字元', 'error'); return; }
    jsonp({ action: 'setPassword', password: adminPassword, newPassword: nw }, function(err, data) {
      if (err || (data && data.error)) {
        showToast('變更失敗，請重試', 'error');
      } else {
        adminPassword = nw;
        showToast('密碼已成功變更 ✅', 'success');
        document.getElementById('curPw').value = '';
        document.getElementById('newPw').value = '';
        document.getElementById('confirmPw').value = '';
      }
    });
  }

  /* ── Utilities ── */
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Init: check if first-time setup ── */
  (function() {
    jsonp({ action: 'checkInit' }, function(err, data) {
      if (!err && data && data.firstTime) {
        document.getElementById('loginSubtitle').textContent = '首次登入，請設定管理員密碼';
        document.getElementById('loginHint').textContent = '您輸入的密碼將成為管理員密碼';
      }
    });
  })();
</script>
