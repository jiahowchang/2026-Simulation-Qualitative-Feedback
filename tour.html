<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>InSim擬境 — 360 擬真情境</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="360情境">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="tour.webmanifest">
<link rel="apple-touch-icon" href="icons/tour-180.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5/index.min.css">
<style>
  :root{ --accent:#2b7de9; --ok:#22a06b; --bad:#e0533d; --ink:#1c2733; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif; color:var(--ink); background:#000; overflow:hidden; }
  #viewer{ width:100vw; height:100vh; }

  /* 頂部資訊列 */
  #topbar{ position:fixed; top:0; left:0; right:0; z-index:30; display:flex; align-items:center; gap:12px;
    padding:10px 14px; background:linear-gradient(#000a,#0000); color:#fff; pointer-events:none; }
  #topbar .title{ font-weight:700; font-size:16px; text-shadow:0 1px 3px #000; }
  #topbar .scene{ font-size:13px; opacity:.85; text-shadow:0 1px 3px #000; }
  #score{ margin-left:auto; background:#0008; border:1px solid #fff3; border-radius:20px;
    padding:6px 14px; font-size:14px; font-weight:600; pointer-events:auto; }
  #score b{ color:#ffd76a; }

  /* 場景清單（左下） */
  #scenes{ position:fixed; left:12px; bottom:12px; z-index:30; display:flex; gap:8px; flex-wrap:wrap; max-width:60vw; }
  #scenes button{ background:#000a; color:#fff; border:1px solid #fff4; border-radius:8px;
    padding:6px 12px; font-size:13px; cursor:pointer; backdrop-filter:blur(4px); }
  #scenes button.active{ background:var(--accent); border-color:var(--accent); }

  /* 找危害進度（右下） */
  #hazardbar{ position:fixed; right:12px; bottom:12px; z-index:30; background:#000a; color:#fff;
    border:1px solid #fff3; border-radius:10px; padding:8px 14px; font-size:13px; display:none; }
  #hazardbar b{ color:var(--ok); }

  /* 熱點外觀 */
  .hs{ width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; border:2px solid #fff; box-shadow:0 2px 8px #0007;
    transition:transform .15s; animation:pulse 2s infinite; }
  .hs:hover{ transform:scale(1.15); }
  .hs.nav{ background:#2b7de9cc; }
  .hs.info{ background:#8b5cf6cc; }
  .hs.quiz{ background:#f59e0bcc; }
  .hs.branch{ background:#ec4899cc; }
  .hs.hazard{ background:#ffffff33; border-style:dashed; }
  .hs.media{ background:#0ea5e9cc; }
  .hs.action{ background:#14b8a6cc; }
  .hs.found{ background:var(--ok); animation:none; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 #ffffff88; } 70%{ box-shadow:0 0 0 12px #ffffff00; } 100%{ box-shadow:0 0 0 0 #ffffff00; } }
  /* 熱點下方常駐文字標籤（iPad 無 hover 也看得到） */
  .hswrap{ position:relative; width:38px; height:38px; }
  .hslabel{ position:absolute; top:42px; left:50%; transform:translateX(-50%); white-space:nowrap;
    background:#000b; color:#fff; font-size:12px; font-weight:600; padding:3px 9px; border-radius:9px;
    text-shadow:0 1px 2px #000; pointer-events:none; }

  /* 彈窗 */
  #modal{ position:fixed; inset:0; z-index:60; background:#0009; display:none; align-items:center; justify-content:center; padding:20px; }
  #modal.show{ display:flex; }
  .card{ background:#fff; border-radius:16px; max-width:520px; width:100%; max-height:86vh; overflow:auto; box-shadow:0 20px 60px #000a; }
  /* AI 病人/家屬對話面板（右下角，共用 SimPatient proxy） */
  #chatPanel{ position:fixed; right:14px; bottom:14px; z-index:45; width:min(380px,92vw); background:#101826;
    border:1px solid #ffffff26; border-radius:14px; box-shadow:0 12px 40px #000c; display:none; flex-direction:column; overflow:hidden; }
  #chatPanel.show{ display:flex; }
  /* 團隊模式面板（左側：成員/動態/TRM 標記） */
  #teamPanel{ position:fixed; left:12px; top:56px; z-index:44; width:262px; max-height:70vh;
    background:#101826ee; border:1px solid #ffffff22; border-radius:12px; color:#fff;
    display:none; flex-direction:column; overflow:hidden; font-size:13px; }
  #teamPanel.show{ display:flex; }
  #teamPanel .tp-head{ display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; background:#0b1220; font-weight:700; }
  #teamPanel .tp-head button{ background:none; border:0; color:#fff; font-size:15px; cursor:pointer; }
  #teamPanel.min #tpBody{ display:none; }
  #tpBody{ overflow-y:auto; padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  .tp-sub{ font-size:11px; color:#9aa7b8; margin-top:4px; letter-spacing:.1em; }
  #tpMembers .tp-m{ display:flex; align-items:center; gap:7px; padding:3px 0; }
  #tpMembers .dot{ width:10px; height:10px; border-radius:50%; flex:0 0 10px; }
  #tpMembers .rl{ color:#9aa7b8; font-size:11px; margin-left:auto; }
  #tpTrm{ display:none; }
  #trmTarget{ width:100%; padding:6px 8px; border-radius:8px; border:1px solid #ffffff22;
    background:#0b1220; color:#fff; font-size:12px; margin:4px 0 6px; font-family:inherit; }
  .trm-grid{ display:grid; grid-template-columns:1fr 1fr; gap:5px; }
  .trm-btn{ border:0; border-radius:8px; padding:7px 4px; font-size:12px; font-weight:700;
    cursor:pointer; font-family:inherit; }
  .trm-btn.ok{ background:#14532d; color:#86efac; }
  .trm-btn.bad{ background:#57281e; color:#fda4af; }
  #tpFeed{ display:flex; flex-direction:column; gap:4px; }
  #tpFeed .fe{ padding:5px 8px; background:#ffffff0d; border-radius:8px; line-height:1.45; }
  #tpFeed .fe .who{ font-weight:700; }
  #tpFeed .fe .tm{ color:#9aa7b8; font-size:10px; margin-right:5px; }
  #tpFeed .fe.trm-ok{ background:#14532d55; }
  #tpFeed .fe.trm-bad{ background:#57281e66; }
  #tpChatRow{ display:flex; gap:6px; padding:8px; background:#0b1220; }
  #tpChat{ flex:1; min-width:0; padding:8px 10px; border-radius:8px; border:1px solid #ffffff22;
    background:#101826; color:#fff; font-size:12px; }
  #tpChatRow button{ border:0; border-radius:8px; padding:0 12px; background:#2b7de9; color:#fff;
    cursor:pointer; font-size:14px; }
  /* 挑戰關卡 HUD（頂部中央） */
  #stageBar{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:35;
    background:#000a; border:1px solid #ffffff33; border-radius:20px; padding:7px 18px;
    color:#fff; font-size:13.5px; display:none; white-space:nowrap; }
  #stageBar b{ color:#ffd76a; }
  #stageBar .sb-warn{ color:#ff7b6b; }
  /* 場景內學員 Avatar 名牌與動作泡泡 */
  .tm-fig{ position:relative; }
  .tm-name{ position:absolute; top:-6px; left:50%; transform:translateX(-50%); white-space:nowrap;
    color:#fff; font-size:22px; font-weight:800; padding:4px 14px; border-radius:12px;
    text-shadow:0 1px 3px #000; }
  .tm-bubble{ position:absolute; top:-52px; left:50%; transform:translateX(-50%); white-space:nowrap;
    background:#fff; color:#1c2733; font-size:20px; font-weight:700; padding:6px 14px; border-radius:14px;
    opacity:0; transition:opacity .3s; box-shadow:0 4px 12px #0008; }
  .tm-bubble.show{ opacity:1; }

  /* 對話角色特寫（浮在面板右上方，會眨眼/對嘴型/做表情） */
  #cpAvatarWrap{ position:fixed; right:22px; z-index:46; width:132px; height:154px;
    pointer-events:none; display:none; }
  #cpAvatar, #cpAvatar svg{ width:100%; height:100%; display:block; }
  #cpAvatar svg{ filter: drop-shadow(0 6px 14px rgba(0,0,0,.5)); }
  #chatPanel .cp-head{ display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:#0b1220; color:#fff; font-size:14px; font-weight:700; }
  #chatPanel .cp-head button{ background:none; border:0; color:#fff; font-size:16px; cursor:pointer; padding:0 4px; }
  #chatPanel .cp-head button.off{ opacity:.35; }
  #cpMsgs{ height:min(36vh,300px); overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .cp-msg{ max-width:86%; padding:8px 11px; border-radius:12px; font-size:14px; line-height:1.55; color:#fff; white-space:pre-wrap; }
  .cp-msg.user{ align-self:flex-end; background:#2b7de9; }
  .cp-msg.ai{ align-self:flex-start; background:#243144; }
  .cp-msg.sys{ align-self:center; background:none; color:#9aa7b8; font-size:12px; }
  #cpRow{ display:flex; gap:6px; padding:8px; background:#0b1220; }
  #cpInput{ flex:1; min-width:0; padding:9px 11px; border-radius:9px; border:1px solid #ffffff22; background:#101826; color:#fff; font-size:14px; }
  #cpRow button{ border:0; border-radius:9px; padding:0 12px; font-size:16px; cursor:pointer; background:#2b7de9; color:#fff; }
  #cpMic.on{ background:#e0533d; animation:pulse 1.2s infinite; }

  /* 內嵌 SimMonitor 小面板：貼著監視器熱點、跟隨視角、不擋環景操作 */
  #monPanel{ position:fixed; z-index:40; width:clamp(260px,23vw,360px); background:#000;
    border:1px solid #444; border-radius:12px; box-shadow:0 10px 30px #000c; overflow:hidden; display:none; }
  #monPanel .mp-head{ display:flex; align-items:center; justify-content:space-between; padding:3px 10px; background:#111; color:#fff; font-size:12px; }
  #monPanel .mp-x{ background:none; border:0; color:#fff; font-size:16px; cursor:pointer; padding:0 4px; }
  /* iframe 以 2 倍尺寸渲染再縮小 0.5：監視器用手機橫向版面呈現，縮小後依然清晰 */
  #monPanel .mp-body{ width:100%; aspect-ratio:16/10; overflow:hidden; position:relative; background:#000; }
  #monPanel iframe{ width:200%; height:200%; transform:scale(.5); transform-origin:0 0; border:0; display:block; background:#000; pointer-events:none; }
  .card .head{ padding:16px 20px; border-bottom:1px solid #eee; font-weight:700; font-size:17px; display:flex; align-items:center; gap:8px; }
  .card .body{ padding:20px; font-size:15px; line-height:1.7; }
  .card .body img,.card .body video{ max-width:100%; border-radius:10px; margin:10px 0; }
  .card .body iframe{ width:100%; height:60vh; border:0; border-radius:10px; margin:10px 0; background:#fff; }
  .card .body audio{ width:100%; margin:10px 0; }
  .card .foot{ padding:14px 20px; border-top:1px solid #eee; display:flex; gap:10px; justify-content:flex-end; }
  .btn{ border:0; border-radius:10px; padding:10px 18px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn.primary{ background:var(--accent); color:#fff; }
  .btn.ghost{ background:#eef1f5; color:var(--ink); }
  .opt{ display:block; width:100%; text-align:left; margin:8px 0; padding:12px 14px; border:2px solid #e3e8ee;
    background:#fff; border-radius:10px; font-size:15px; cursor:pointer; }
  .opt:hover{ border-color:var(--accent); }
  .opt.correct{ border-color:var(--ok); background:#eafaf2; }
  .opt.wrong{ border-color:var(--bad); background:#fdecea; }
  .feedback{ margin-top:12px; padding:12px 14px; border-radius:10px; font-size:14px; }
  .feedback.ok{ background:#eafaf2; color:#146c47; }
  .feedback.bad{ background:#fdecea; color:#a32a17; }

  /* 開場輸入 */
  #gate{ position:fixed; inset:0; z-index:80; background:#0f172a; color:#fff; display:flex; align-items:center; justify-content:center; }
  #gate .box{ text-align:center; max-width:360px; padding:24px; }
  #gate h1{ font-size:22px; margin:0 0 6px; }
  .gate-logo{ width:min(210px,52vw); margin:0 auto 2px; display:block; }
  .gate-brand{ color:#5eead4; font-size:13px; letter-spacing:.35em; margin-bottom:18px; opacity:.9; }
  .gate-logos{ margin-top:26px; display:flex; gap:12px; justify-content:center; align-items:center; }
  .gate-logos img{ height:52px; width:auto; border-radius:10px; }
  .gate-logos .gl-hosp{ background:#fff; padding:6px 10px; box-sizing:border-box; }
  #gate p{ opacity:.8; font-size:14px; margin:0 0 20px; }
  #gate input{ width:100%; padding:12px 14px; border-radius:10px; border:1px solid #ffffff33; background:#ffffff14; color:#fff; font-size:16px; text-align:center; }
  #gate select{ width:100%; padding:12px 14px; margin-bottom:10px; border-radius:10px; border:1px solid #5eead466;
    background:#ffffff14; color:#5eead4; font-size:14px; font-weight:600; text-align:center; text-align-last:center;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    -webkit-appearance:none; appearance:none; cursor:pointer; font-family:inherit; }
  #gate button{ margin-top:14px; width:100%; }
  #toast{ position:fixed; bottom:70px; left:50%; transform:translateX(-50%); z-index:90; background:#111d; color:#fff; padding:10px 18px; border-radius:20px; font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none; }
  #toast.show{ opacity:1; }
  #finishBtn{ background:#0008; border:1px solid #fff3; color:#fff; border-radius:20px; padding:6px 14px; font-size:14px; font-weight:600; cursor:pointer; pointer-events:auto; margin-left:8px; }

  /* 除錯總結畫面 */
  #debrief{ position:fixed; inset:0; z-index:70; background:#0f172a; color:#fff; display:none; align-items:center; justify-content:center; padding:20px; overflow:auto; }
  #debrief.show{ display:flex; }
  #debrief .dcard{ background:#111827; border:1px solid #ffffff1a; border-radius:16px; max-width:520px; width:100%; padding:24px; }
  #debrief h2{ margin:0 0 4px; font-size:22px; }
  #debrief .big{ font-size:46px; font-weight:800; margin:6px 0 2px; }
  #debrief .pass{ color:#22c55e; } #debrief .fail{ color:#f87171; }
  #debrief .verdict{ font-size:15px; opacity:.85; margin-bottom:14px; }
  #debrief .stat{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid #ffffff14; font-size:15px; }
  #debrief .stat b{ font-variant-numeric:tabular-nums; }
  #debrief .mist{ margin:14px 0 0; padding:0 0 0 2px; list-style:none; font-size:14px; }
  #debrief .mist li{ margin:6px 0; color:#fca5a5; }
  #debrief .mist li.okitem{ color:#86efac; }
  #debrief .foot{ margin-top:18px; display:flex; gap:10px; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <img class="gate-logo" src="images/logo-insim.png" alt="InSim擬境">
    <div class="gate-brand">360° 擬真情境教學平台</div>
    <h1 id="gateTitle">360 情境導覽</h1>
    <p>請選擇教案，並輸入姓名或學號開始</p>
    <select id="gateTour"><option value="demo">載入教案清單…</option></select>
    <input id="gateName" placeholder="姓名 / 學號" autocomplete="off">
    <input id="gateMon" placeholder="連動碼（通常留空）" inputmode="numeric" autocomplete="off" style="margin-top:10px">
    <input id="gateTeam" placeholder="團隊碼（多人同場演練，選填）" inputmode="numeric" autocomplete="off" style="margin-top:10px">
    <select id="gateRole" style="margin-top:10px;display:none">
      <option value="leaderDr">🔴 Leader Dr（總指揮）</option>
      <option value="leaderN">🟡 Leader N（計時／讀秒／紀錄）</option>
      <option value="airway">🔵 Airway（呼吸道）</option>
      <option value="circulation">🟢 Circulation（循環）</option>
      <option value="support">🟣 Support（抽藥／打針）</option>
      <option value="observer">🎓 教師觀察（TRM 標記）</option>
    </select>
    <p style="opacity:.6;font-size:12px;margin:6px 0 0;line-height:1.5">連動碼：教師 iPad 控制台連同碼可<b>即時操控本情境內的監視器</b>。團隊碼：全組輸入<b>同一組數字</b>即進入同一場景 — 互相看得到彼此的角色 Avatar、動作即時同步；教師選「教師觀察」可即時標記 <b>TRM 行為</b>（警覺/溝通/互助/領導）</p>
    <button class="btn primary" id="gateStart">開始</button>
    <div class="gate-logos">
      <img class="gl-hosp" src="images/logo-hsinchu.png" alt="新竹台大分院">
      <img class="gl-trm" src="images/logo-trm.png" alt="TRM 團隊資源管理">
    </div>
  </div>
</div>

<div id="viewer"></div>

<div id="topbar">
  <div>
    <div class="title" id="tTitle">—</div>
    <div class="scene" id="tScene">—</div>
  </div>
  <div id="monLink" style="display:none;background:#0a84ff22;border:1px solid #0a84ff88;color:#8fd0ff;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;pointer-events:auto">🔗 監視器 <b id="monCodeVal"></b></div>
  <div id="score">得分 <b id="scoreVal">0</b></div>
  <button id="finishBtn">結束情境</button>
</div>

<div id="scenes"></div>
<div id="hazardbar">找出危害 <b id="hzFound">0</b> / <span id="hzTotal">0</span></div>

<div id="modal"><div class="card">
  <div class="head" id="mHead">標題</div>
  <div class="body" id="mBody"></div>
  <div class="foot" id="mFoot"></div>
</div></div>

<div id="toast"></div>

<div id="monPanel">
  <div class="mp-head"><span>🖥️ 生理監視器 <b id="mpCode"></b></span><button class="mp-x" id="monPanelX">✕</button></div>
  <div class="mp-body"><iframe id="monPanelFrame" allow="autoplay"></iframe></div>
</div>

<!-- 團隊模式：成員清單 + 即時動態 + 教師 TRM 標記 -->
<div id="teamPanel">
  <div class="tp-head"><span>👥 團隊 <b id="tpRoom"></b></span><button id="tpToggle">—</button></div>
  <div id="tpBody">
    <div id="tpMembers"></div>
    <div id="tpTrm">
      <div class="tp-sub">TRM 行為標記（教師）</div>
      <select id="trmTarget"><option value="">— 全隊 —</option></select>
      <div class="trm-grid">
        <button class="trm-btn ok" data-dim="A">警覺 ＋</button><button class="trm-btn bad" data-dim="A">警覺 △</button>
        <button class="trm-btn ok" data-dim="C">溝通 ＋</button><button class="trm-btn bad" data-dim="C">溝通 △</button>
        <button class="trm-btn ok" data-dim="S">互助 ＋</button><button class="trm-btn bad" data-dim="S">互助 △</button>
        <button class="trm-btn ok" data-dim="L">領導 ＋</button><button class="trm-btn bad" data-dim="L">領導 △</button>
      </div>
    </div>
    <div class="tp-sub">即時動態</div>
    <div id="tpFeed"></div>
  </div>
  <div id="tpChatRow">
    <input id="tpChat" placeholder="隊內訊息…" autocomplete="off">
    <button id="tpSend">➤</button>
  </div>
</div>

<!-- 挑戰關卡 HUD -->
<div id="stageBar"></div>

<div id="cpAvatarWrap"><div id="cpAvatar"></div></div>
<div id="chatPanel">
  <div class="cp-head"><span id="cpTitle">🗣️ 對話</span><span><button id="cpVoice" title="語音朗讀開/關">🔊</button><button id="cpX">✕</button></span></div>
  <div id="cpMsgs"></div>
  <div id="cpRow">
    <button id="cpMic" title="語音輸入">🎤</button>
    <input id="cpInput" placeholder="輸入要說的話…" autocomplete="off">
    <button id="cpSend">➤</button>
  </div>
</div>

<div id="debrief"><div class="dcard" id="debriefBody"></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.module.js",
    "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5/index.module.js"
  }
}
</script>

<script type="module">
import { Viewer } from '@photo-sphere-viewer/core';
import { MarkersPlugin } from '@photo-sphere-viewer/markers-plugin';

         onSnapshot, query, orderBy, limit }

/* ---------- Firebase（沿用現有專案，新增獨立集合） ---------- */
const firebaseConfig = {
  apiKey:"AIzaSyBrs80vpFVe-iEh5ctzRWfYHUBb3KGvILo",
  authDomain:"speech-to-text-2f776.firebaseapp.com",

function esc2(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

async function joinTeam(code, role){
  team = { code, role, memberId: (student+"_"+Math.random().toString(36).slice(2,6)).replace(/[^\w一-鿿-]/g,"_") };
  const roomRef = doc(db, C_ROOMS, code);
  try{
    const s = await getDoc(roomRef);
    if(!s.exists()) await setDoc(roomRef, { tourId: tour.id, createdAt: serverTimestamp(),
      state: { vars: vars, revealed: [], hidden: [], done: [], foundHazards: [], score: 0 } });
  }catch(e){ console.warn("joinTeam", e); }
  const memRef = doc(db, C_ROOMS, code, "members", team.memberId);
  await setDoc(memRef, { name: student, role, lastSeen: Date.now(), joinedAt: serverTimestamp() }).catch(()=>{});
  team.hb = setInterval(()=> setDoc(memRef, { lastSeen: Date.now() }, { merge:true }).catch(()=>{}), 25000);
  // 入房順手清掃：把 10 分鐘以上沒心跳的殘留成員移除
  try{
    const ms = await getDocs(collection(db, C_ROOMS, code, "members"));
    ms.docs.forEach(d=>{ const v=d.data()||{}; if(Date.now()-(v.lastSeen||0) > 600000) deleteDoc(d.ref).catch(()=>{}); });
  }catch(e){}

  // 共享情境狀態：一人洗手/答題/找到危害 → 全隊同步解鎖與計分
  onSnapshot(roomRef, snap=>{
    const st = snap.data() && snap.data().state; if(!st) return;
    applyingRemote = true;
    try{
      Object.assign(vars, st.vars||{});
      (st.revealed||[]).forEach(id=>revealed.add(id));
      (st.hidden||[]).forEach(id=>hiddenSet.add(id));
      (st.done||[]).forEach(id=>done.add(id));
      (st.foundHazards||[]).forEach(id=>foundHazards.add(id));
      if(typeof st.score==="number" && st.score>score){ score=st.score; $("scoreVal").textContent=score; }
      Object.entries(st.stageStarts||{}).forEach(([k,v])=>{
        if(!stageStarts[k] || v < stageStarts[k]) stageStarts[k] = v;   // 取最早開始時間
      });
      if(viewer){ drawMarkers(); }
    }finally{ applyingRemote = false; }
    checkStages();   // 隊友完成任務 → 本地也結算關卡/揭示下一關
  });
  // 成員出席（心跳 90 秒內視為在場）
  onSnapshot(collection(db, C_ROOMS, code, "members"), snap=>{
    teamMembers = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    // 資料庫位置已是最新 → 清掉本地拖曳暫存（拖曳中的那位除外）
    Object.keys(POS_LIVE).forEach(id=>{ if(id!==avatarDragId) delete POS_LIVE[id]; });
    renderTeamMembers();
    if(viewer && !avatarDragId) drawMarkers();   // 拖曳中不重建 marker（避免中斷拖曳）
  });
  // 即時動態（動作 + TRM 標記）
  onSnapshot(query(collection(db, C_ROOMS, code, "events"), orderBy("atLocal","desc"), limit(40)), snap=>{
    teamEvents = snap.docs.map(d=>d.data());
    renderTeamFeed();
    if(teamEvents[0]) showTeamBubble(teamEvents[0]);
  });
  $("tpRoom").textContent = code;
  $("teamPanel").classList.add("show");
  if(role==="observer") $("tpTrm").style.display="block";
}
function publishTeamState(){
  if(!team || applyingRemote || !db) return;
  setDoc(doc(db, C_ROOMS, team.code), { state:{
    vars, revealed:[...revealed], hidden:[...hiddenSet], done:[...done],
    foundHazards:[...foundHazards], score, stageStarts }, seq: Date.now() }, { merge:true }).catch(()=>{});
}
function teamLogEvent(type, data){
  if(!team || !db) return;
  const label = evtLabel(type, data); if(!label) return;
  addDoc(collection(db, C_ROOMS, team.code, "events"),
    { atLocal: Date.now(), name: student, role: team.role, memberId: team.memberId, type, label,
      dim: (data&&data.dim)||null, ok: (data&&typeof data.ok==="boolean")? data.ok : null,
      target: (data&&data.target)||null }).catch(()=>{});
}
function evtLabel(type, d){
  d = d||{};
  switch(type){
    case "start": return "進入情境";
    case "hotspot": return "操作：" + (d.label||d.id||"");
    case "quiz_answer": return d.correct ? "✅ 答對測驗" : "❌ 測驗答錯";
    case "hazard_found": return "⚠️ 找到危害：" + (d.label||"");
    case "open_patient": return "開始問診／對話";
    case "patient_chat": return "問診：「" + String(d.q||"").slice(0,16) + "…」";
    case "open_monitor": return "查看監視器";
    case "media": return "查看：" + (d.label||"檢查結果");
    case "info": return "查看：" + (d.label||"資訊");
    case "nav": return "移動到其他場景";
    case "chat": return "💬 " + String(d.text||"").slice(0,50);
    case "move": return "移動了站位";
    case "stage_done": return "🏁 完成關卡：" + (d.title||"") + (d.fast?"（限時達成）":"");
    case "locked": return null;
    case "trm": return (d.ok?"👍 ":"⚠️ ") + ({A:"警覺",C:"溝通",S:"互助",L:"領導"}[d.dim]||"") + (d.target? "→"+d.target : "（全隊）");
    default: return null;
  }
}

function showTeamBubble(ev){
  if(ev.type==="trm") return;

function teamMemberEl(m){
  let el = TEAM_EL[m.id];
  if(!el){
    const r = ROLES[m.role]||{ color:"#888", label:"" };
    el = document.createElement("div");
    el.className = "tm-fig";
    el.style.width = "210px"; el.style.height = "540px";
    el.style.cursor = "grab"; el.style.touchAction = "none";
    el.innerHTML = `<div class="tm-bubble"></div><div class="tm-name" style="background:${r.color}cc">${esc2(m.name)}｜${r.label}</div><div class="tm-svg" style="width:100%;height:100%"></div>`;
    TEAM_EL[m.id] = el;
    makeAvatarDraggable(el, m.id);
    (NURSE_TXT ? Promise.resolve(NURSE_TXT) : fetch("images/props/nurse.svg").then(x=>x.text()).then(t=>(NURSE_TXT=t)))
      .then(txt=>{
        const recolored = txt.replaceAll("#17A093", r.color).replaceAll("#0F7C72", shade(r.color, 0.72));
        const box = el.querySelector(".tm-svg"); box.innerHTML = recolored;
        const svg = box.querySelector("svg");
        if(svg){ svg.style.width="100%"; svg.style.height="100%"; svg.style.display="block"; svg.removeAttribute("width"); svg.removeAttribute("height"); }
      }).catch(()=>{});
  }
  return el;
}
/* 拖放移動 Avatar：拖曳中鎖住全景旋轉，放開後位置寫回房間 → 全隊同步 */
const POS_LIVE = {};       // memberId → 拖曳中的即時位置（優先於資料庫值）
let avatarDragId = null;
function screenToSph(clientX, clientY){
  const rect = $("viewer").getBoundingClientRect();
  const pt = { x: clientX-rect.left, y: clientY-rect.top };
  try{
    const dh = viewer.dataHelper;
    if(dh.viewerCoordsToSphericalCoords) return dh.viewerCoordsToSphericalCoords(pt);
    if(dh.viewerCoordsToVector3){ const v = dh.viewerCoordsToVector3(pt); if(v) return dh.vector3ToSphericalCoords(v); }
  }catch(e){}
  return null;
}
function makeAvatarDraggable(el, memberId){
  let dragging = false, moved = false;
  el.addEventListener("pointerdown", e=>{
    dragging = true; moved = false; avatarDragId = memberId;
    el.style.cursor = "grabbing";
    try{ el.setPointerCapture(e.pointerId); }catch(err){}
    e.stopPropagation(); e.preventDefault();
  });
  el.addEventListener("pointermove", e=>{
    if(!dragging) return;
    e.stopPropagation();
    const sph = screenToSph(e.clientX, e.clientY);
    if(sph && typeof sph.yaw==="number"){
      moved = true;
      POS_LIVE[memberId] = { yaw:sph.yaw, pitch:sph.pitch };
      try{ markers.updateMarker({ id:"tm_"+memberId, position: POS_LIVE[memberId] }); }catch(err){}
    }
  });
  const up = e=>{
    if(!dragging) return;
    dragging = false; avatarDragId = null;
    el.style.cursor = "grab";
    e.stopPropagation();
    if(moved && POS_LIVE[memberId] && team && db){
      setDoc(doc(db, C_ROOMS, team.code, "members", memberId),
        { pos: POS_LIVE[memberId] }, { merge:true }).catch(()=>{});
      logEvent("move",{ });
    }
  };
  el.addEventListener("pointerup", up);
  el.addEventListener("pointercancel", up);
}
function teamMarkers(){
  if(!team) return [];
  return teamMembers
    .filter(m=> ROLES[m.role] && ROLES[m.role].yaw!==undefined && Date.now()-(m.lastSeen||0)<90000)
    .map(m=>{
      const pos = POS_LIVE[m.id] || (m.pos && typeof m.pos.yaw==="number" ? m.pos : { yaw:ROLES[m.role].yaw, pitch:ROLES[m.role].pitch });
      return { id:"tm_"+m.id, elementLayer: teamMemberEl(m),
        position: pos, zIndex:2, data:{ __team:m.id } };
    });
}

document.querySelectorAll(".trm-btn").forEach(b=>{

/* ---------- 挑戰關卡系統：任務全隊分工完成 → 團隊獎勵分（限時再加速度獎勵） ----------
   tour.stages = [{ id, title, tasks:[hotspotIds], bonus, timeLimit(秒,選填), fastBonus(選填) }]
   任務熱點可加 role:"circulation"（角色專屬）、once:true（防重複）、gated:true（不被關卡自動揭示，
   仍走原本 reveal 動作鏈） */
let stageStarts = {};            // stageId → 開始時間（隨房間同步，取最早值）
function stagesOf(){ return Array.isArray(tour.stages) ? tour.stages : []; }
function isStageTask(id){ return stagesOf().some(s=>(s.tasks||[]).includes(id)); }
function curStageIdx(){
  const ss = stagesOf();
  for(let i=0;i<ss.length;i++){ if(!(ss[i].tasks||[]).every(id=>done.has(id))) return i; }
  return ss.length;
}
function checkStages(){
  const ss = stagesOf(); if(!ss.length) return;
  const sc = curSceneObj();
  ss.forEach((st,i)=>{
    const doneAll = (st.tasks||[]).every(id=>done.has(id));
    if(doneAll && !done.has("stg_"+st.id)){
      done.add("stg_"+st.id);
      let pts = st.bonus||0;
      const t0 = stageStarts[st.id];
      const fast = st.timeLimit && t0 && (Date.now()-t0)/1000 <= st.timeLimit;
      if(fast) pts += (st.fastBonus||0);
      if(pts) addScore(pts);
      toast(`🎉 完成關卡「${st.title}」${fast?"（限時達成！）":""} +${pts} 分`);
      logEvent("stage_done",{ id:st.id, title:st.title, fast:!!fast });
    }
  });
  const idx = curStageIdx();
  if(idx < ss.length){
    const st = ss[idx];
    if(!stageStarts[st.id]) stageStarts[st.id] = Date.now();
    // 自動揭示目前關卡任務（gated:true 者除外——它們由前置動作鏈解鎖）
    (st.tasks||[]).forEach(id=>{
      const h = sc && (sc.hotspots||[]).find(x=>x.id===id);
      if(h && h.startHidden && !h.gated) revealed.add(id);
    });
  }
  renderStageBar();
  if(viewer) drawMarkers();
}
function renderStageBar(){
  const ss = stagesOf(), bar = $("stageBar");
  if(!ss.length){ bar.style.display="none"; return; }
  const idx = curStageIdx();
  if(idx >= ss.length){
    bar.style.display="block";
    bar.innerHTML = "🏁 <b>全部關卡完成！</b>可按「結束情境」看總結";
    return;
  }
  const st = ss[idx];
  const doneN = (st.tasks||[]).filter(id=>done.has(id)).length;
  let timer = "";
  if(st.timeLimit && stageStarts[st.id]){
    const left = Math.round(st.timeLimit - (Date.now()-stageStarts[st.id])/1000);
    timer = ` ─ ⏱ <b class="${left<15?'sb-warn':''}">${left>=0? left+"s" : "逾時"}</b>`;
  }
  bar.style.display="block";
  bar.innerHTML = `關卡 ${idx+1}/${ss.length}：<b>${esc2(st.title)}</b> ─ 任務 ${doneN}/${(st.tasks||[]).length}${timer}`;
}
setInterval(()=>{ if(stagesOf().length && startTime) renderStageBar(); }, 1000);
// 隊內文字聊天（遠端連線溝通；訊息也會浮在該成員 Avatar 頭上）

  teamLogEvent("chat", { text: t });

$("tpChat").addEventListener("keydown", e=>{ if(e.key==="Enter") sendTeamChat(); });
function condMatch(cond){ return Object.keys(cond||{}).every(k => vars[k] === cond[k]); }
function hsVisible(h){
  if(hiddenSet.has(h.id)) return false;
  if(h.startHidden && !revealed.has(h.id)) return false;
  if(h.showIf && !condMatch(h.showIf)) return false;
  return true;
}

/* ---------- 進度儲存（獨立集合，不動現有資料） ---------- */
const progressId = () => `${tour.id}__${student}`.replace(/[^a-zA-Z0-9_一-鿿-]/g,"_");
async function saveProgress(){
  if(!db) return;
  publishTeamState();   // 團隊模式：把情境狀態同步給全隊
  try{
    await setDoc(doc(db, C_PROG, progressId()), {
      tourId:tour.id, student, score,
      done:[...done], foundHazards:[...foundHazards], curScene,
      vars, revealed:[...revealed], hiddenSet:[...hiddenSet], quizTotal, quizCorrect,
      updatedAt: serverTimestamp()
    }, { merge:true });
  }catch(e){ console.warn("saveProgress", e); }
}
async function logEvent(type, data){
  if(!db) return;
  teamLogEvent(type, data);   // 團隊模式：同步到房間即時動態
  try{ await addDoc(collection(db, C_EVT), { tourId:tour.id, student, type, data, at:serverTimestamp() }); }
  catch(e){ console.warn("logEvent", e); }
}
async function loadProgress(){
  if(!db) return;
  try{
    const s = await getDoc(doc(db, C_PROG, progressId()));
    if(s.exists()){
      const d = s.data();
      score = d.score||0; (d.done||[]).forEach(x=>done.add(x)); (d.foundHazards||[]).forEach(x=>foundHazards.add(x));
      if(d.vars) vars = Object.assign(vars, d.vars);
      (d.revealed||[]).forEach(x=>revealed.add(x)); (d.hiddenSet||[]).forEach(x=>hiddenSet.add(x));
      quizTotal=d.quizTotal||0; quizCorrect=d.quizCorrect||0;
      $("scoreVal").textContent = score;
      return d.curScene;
    }
  }catch(e){ console.warn("loadProgress", e); }
}

/* ---------- Viewer ---------- */
let viewer, markers;
function initViewer(scene){
  viewer = new Viewer({
    container: $("viewer"),
    panorama: scene.panorama,
    defaultYaw: scene.initialView?.yaw||0,
    defaultPitch: scene.initialView?.pitch||0,
    navbar: ["zoom","move","fullscreen"],
    plugins: [[MarkersPlugin, {}]]
  });
  markers = viewer.getPlugin(MarkersPlugin);
  markers.addEventListener("select-marker", ({ marker }) => {
    if(Date.now()-lastHsFire<600) return;   // 觸控備援已處理過就跳過
    lastHsFire = Date.now();
    const d = marker.data;
    if(d && d.__prop){   // 點虛擬人物/物件 → 觸發其連結的熱點（例：點家屬開啟對話）
      const p = d.__prop, sc = curSceneObj();
      const h = p.hotspot && sc && (sc.hotspots||[]).find(x=>x.id===p.hotspot);
      if(h && hsVisible(h)) onHotspot(h);
      return;
    }
    onHotspot(d);
  });

  // iPad/iOS 觸控備援：部分 iOS 裝置上 PSV 的 select-marker 不觸發，
  // 直接偵測熱點 DOM 的「輕點」（位移 <12px 且 <600ms 才算，拖曳環景不會誤觸）
  let tx=0, ty=0, tt=0;
  const vc = $("viewer");
  vc.addEventListener("touchstart", e=>{
    const t=e.touches[0]; tx=t.clientX; ty=t.clientY; tt=Date.now();
  }, { passive:true, capture:true });
  vc.addEventListener("touchend", e=>{
    const t=e.changedTouches[0];
    if(!t || Math.hypot(t.clientX-tx, t.clientY-ty)>12 || Date.now()-tt>600) return;
    const wrap = e.target && e.target.closest ? e.target.closest(".hswrap[data-hs]") : null;
    if(!wrap) return;
    const sc = curSceneObj();
    const h = sc && (sc.hotspots||[]).find(x=>x.id===wrap.dataset.hs);
    if(!h || !hsVisible(h)) return;
    if(Date.now()-lastHsFire<600) return;
    lastHsFire = Date.now();
    e.preventDefault();   // 擋掉後續合成 click，避免 select-marker 雙開
    onHotspot(h);
  }, { passive:false, capture:true });
}
let lastHsFire = 0;

function curSceneObj(){ return tour.scenes.find(s=>s.id===curScene); }
function iconFor(t){ return {nav:"➜",info:"ℹ️",quiz:"❓",branch:"⤢",hazard:"⚠️",media:"📎",action:"⚙️"}[t]||"•"; }

// 虛擬人物/物件（vSim 式）：imageLayer 渲染進全景 3D 空間，隨視角自然縮放
// prop 欄位：{ id, image, yaw, pitch, width, height, rotation?, opacity?, hotspot?, startHidden?, showIf? }
function propVisible(p){
  if(hiddenSet.has(p.id)) return false;
  if(p.startHidden && !revealed.has(p.id)) return false;
  if(p.showIf && !condMatch(p.showIf)) return false;
  return true;
}
const PROP_RIG_EL = {};   // 可動 prop 的 DOM 快取（elementLayer 重繪時重用同一元素）
function propRigElement(p){
  let el = PROP_RIG_EL[p.id];
  if(!el){
    el = document.createElement("div");
    el.className = "prop-rig";
    el.style.width = (+p.width||300)+"px"; el.style.height = (+p.height||600)+"px";
    if(p.hotspot){
      el.style.cursor = "pointer";
      el.addEventListener("click", ()=>{
        if(Date.now()-lastHsFire<600) return; lastHsFire = Date.now();
        const sc = curSceneObj();
        const h = sc && (sc.hotspots||[]).find(x=>x.id===p.hotspot);
        if(h && hsVisible(h)) onHotspot(h);
      });
    }
    PROP_RIG_EL[p.id] = el;
    fetch(p.image).then(r=> r.ok? r.text() : Promise.reject())
      .then(txt=>{
        el.innerHTML = txt;
        const svg = el.querySelector("svg");
        if(svg){ svg.style.width="100%"; svg.style.height="100%"; svg.style.display="block"; svg.removeAttribute("width"); svg.removeAttribute("height"); }
        registerRig("prop:"+p.id, el, { hotspotId: p.hotspot||null, breathe: true });
      }).catch(()=>{});
  }
  return el;
}
function propMarkers(scene){
  const visible = (scene.props||[]).filter(propVisible);
  // 清掉已不可見的 prop 骨架
  [...rigs.keys()].forEach(k=>{
    if(k.startsWith("prop:") && !visible.some(p=>p.rig && ("prop:"+p.id)===k)) unregisterRig(k);
  });
  return visible.map(p => {
    const base = {
      id: "prop_"+p.id,
      position: { yaw:+p.yaw||0, pitch:+p.pitch||0 },
      opacity: p.opacity ?? 1,
      zIndex: p.zIndex ?? 1,
      data: { __prop: p }
    };
    if(p.rig){   // 可動人物：SVG 以 elementLayer 進 3D 場景，與對話特寫同步演出
      return { ...base, elementLayer: propRigElement(p) };
    }
    return { ...base, imageLayer: p.image,
      size: { width:+p.width||600, height:+p.height||600 },
      style: { cursor: p.hotspot ? "pointer" : "default" } };
  });
}

// 只重畫熱點（不重載環景），變數改變 / 顯示隱藏熱點時使用
function drawMarkers(){
  const scene = curSceneObj(); if(!scene || !markers) return;
  const ms = (scene.hotspots||[]).filter(hsVisible).map(h => {
    const found = (h.type==="hazard" && foundHazards.has(h.id));
    // 危害未找到前不顯示標籤（避免直接洩題）；其餘顯示 label / title；角色任務加徽章
    const roleTag = (h.role && ROLES[h.role]) ? ROLES[h.role].label+"｜" : "";
    const label = h.type==="hazard" ? (found ? (h.label||"") : "") : roleTag + (h.label || h.title || "");
    return {
      id: h.id,
      position: { yaw:h.yaw, pitch:h.pitch },
      html: `<div class="hswrap" data-hs="${h.id}"><div class="hs ${h.type}${found?" found":""}">${found?"✓":iconFor(h.type)}</div>${label?`<div class="hslabel">${label}</div>`:""}</div>`,
      size: { width:38, height:38 }, anchor:"center center",
      tooltip: h.label || h.title || h.question || h.type,
      data: h
    };
  });
  markers.setMarkers([...propMarkers(scene), ...teamMarkers(), ...ms]);
  updateHazardBar(scene);
}

function renderScene(scene){
  curScene = scene.id;
  $("tScene").textContent = scene.name || scene.id;
  if(!viewer){ initViewer(scene); }
  else { viewer.setPanorama(scene.panorama, { position:{ yaw:scene.initialView?.yaw||0, pitch:scene.initialView?.pitch||0 } }); }

  const apply = () => drawMarkers();
  if(viewer.state?.ready) apply(); else viewer.addEventListener("ready", apply, { once:true });

  renderSceneButtons();
}

function renderSceneButtons(){
  $("scenes").innerHTML = "";
  tour.scenes.forEach(s => {
    const b = document.createElement("button");
    b.textContent = s.name || s.id;
    if(s.id===curScene) b.className="active";
    b.onclick = () => go(s.id);
    $("scenes").appendChild(b);
  });
}
function updateHazardBar(scene){
  const hz = (scene.hotspots||[]).filter(h=>h.type==="hazard");
  if(!hz.length){ $("hazardbar").style.display="none"; return; }
  $("hazardbar").style.display="block";
  $("hzTotal").textContent = hz.length;
  $("hzFound").textContent = hz.filter(h=>foundHazards.has(h.id)).length;
}
function go(sceneId){
  const s = tour.scenes.find(x=>x.id===sceneId); if(!s) return;
  logEvent("enter_scene",{sceneId});
  renderScene(s); saveProgress();
}

/* ---------- 熱點互動 ---------- */
function addScore(n){ score+=n; $("scoreVal").textContent=score; toast(`+${n} 分`); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1400); }

function onHotspot(h){
  // quiz / branch 自帶互動流程（onSelect 於答對後才觸發）
  if(h.type==="quiz"){ openQuiz(h); return; }
  if(h.type==="branch"){ openBranch(h); return; }

  // 角色專屬任務（團隊模式）：非本角色不能執行 → 逼出分工合作
  if(team && h.role && team.role!==h.role && team.role!=="observer"){
    const rl = ROLES[h.role] ? ROLES[h.role].label : h.role;
    toast(`🔒 這是「${rl}」的任務，請隊友執行`);
    logEvent("locked",{ id:h.id, need:h.role });
    return;
  }
  // once 任務防重複（已完成就不再計分/觸發）
  if(h.once && done.has(h.id)){ toast("✅ 此任務已完成"); return; }

  if(h.type==="nav"){ logEvent("nav",{to:h.targetSceneId}); }
  else if(h.type==="hazard"){ onHazard(h); }
  else if(h.type==="media"){ openMedia(h.media||h); logEvent("media",{id:h.id, label:h.label||h.title||""}); }
  else if(h.type==="info"){ openInfo(h); if(isStageTask(h.id)) done.add(h.id); logEvent("info",{id:h.id, label:h.label||h.title||""}); }
  else if(h.type==="action"){
    if(h.once || isStageTask(h.id)) done.add(h.id);
    logEvent("hotspot",{id:h.id, label:h.label||h.title||""});
  }

  // 通用動作序列（任何型別皆可掛）
  if(Array.isArray(h.onSelect) && h.onSelect.length) runActions(h.onSelect, h);
  // nav 的跳轉放最後，讓 onSelect（如設定變數）先生效
  if(h.type==="nav" && h.targetSceneId) go(h.targetSceneId);
  checkStages();
  saveProgress();
}

/* ---------- 擬真情境：動作序列 ---------- */
function runActions(actions, h){
  let needRedraw = false;
  for(const a of actions){
    const verb = a.do || a.action;
    if(verb==="setVar"){ vars[a.name] = a.value; needRedraw = true; logEvent("set_var",{name:a.name,value:a.value}); }
    else if(verb==="score" || verb==="addScore"){ addScore(a.points||0); }
    else if(verb==="reveal" || verb==="showHotspot"){ (Array.isArray(a.id)?a.id:[a.id]).forEach(id=>{ revealed.add(id); hiddenSet.delete(id); }); needRedraw = true; }
    else if(verb==="hide" || verb==="hideHotspot"){ (Array.isArray(a.id)?a.id:[a.id]).forEach(id=>hiddenSet.add(id)); needRedraw = true; }
    else if(verb==="toast"){ toast(a.msg||""); }
    else if(verb==="media" || verb==="openMedia"){ openMedia(a); }
    else if(verb==="info"){ openInfo(a); }
    else if(verb==="goto" || verb==="gotoScene"){ if(a.id) { if(needRedraw) drawMarkers(); go(a.id); return; } }
    else if(verb==="pushMonitor" || verb==="monitor"){ pushMonitor(a); }
    else if(verb==="openMonitor"){ openMonitorPopup(h); }
    else if(verb==="openPatient" || verb==="patient"){ openPatientChat(a, h); }
    else if(verb==="finish"){ showDebrief(); }
  }
  if(needRedraw) drawMarkers();
}

/* ---------- 連動 SimMonitor：把生命徵象推到監視器場次 ---------- */
function ensureMonCode(){
  if(!monCode){
    monCode = String(Math.floor(1000+Math.random()*9000));   // 沒填碼就自動開一個場次
    $("monCodeVal").textContent = monCode; $("monLink").style.display="block";
  }
  return monCode;
}
async function pushMonitor(spec){
  if(!db){ toast("Firebase 未連線"); return; }
  ensureMonCode();
  const payload = {
    seq: Date.now(),
    rhythm: spec.rhythm || "sinus",
    trend: spec.trend ?? 1,
    ecg12: spec.ecg12 || "normal",
    co2morph: spec.co2 || spec.co2morph || "normal",
    sensors: spec.sensors || { ecg:true, spo2:true, art:true, etco2:true, temp:true },
    t: spec.t || {}
  };
  try{
    // setDoc merge：監視器還沒加入也能先寫入，之後 join 會套用最新狀態
    await setDoc(doc(db, "monitor_sessions", String(monCode)), { ctrl: payload }, { merge:true });
    logEvent("push_monitor", { code:monCode, rhythm:payload.rhythm });
  }catch(e){ console.warn("pushMonitor", e); toast("監視器連動失敗"); }
}
/* ---------- 內嵌 SimMonitor 小面板：貼著熱點、跟隨視角、離開視線自動隱藏 ---------- */
let mpAnchorId = null, mpRAF = 0;
function openMonitorPopup(h){
  ensureMonCode();
  if(h && h.id) mpAnchorId = h.id;
  const f = $("monPanelFrame"), src = `monitor.html?join=${monCode}`;
  if(f.getAttribute("src") !== src) f.setAttribute("src", src);
  $("mpCode").textContent = monCode;
  $("monPanel").dataset.open = "1";
  followMonPanel();
  logEvent("open_monitor",{ code:monCode });
}
function closeMonitorPanel(){
  const p = $("monPanel");
  delete p.dataset.open; p.style.display = "none";
  $("monPanelFrame").removeAttribute("src");   // 停掉 iframe（音效/連線）
  cancelAnimationFrame(mpRAF);
}
$("monPanelX").onclick = closeMonitorPanel;
/* ---------- AI 病人/家屬對話（共用 SimPatient 的 Cloud Function proxy 與 sim_cases） ---------- */
const PROXY_URL = "https://patient-mkargc7maa-uc.a.run.app";
const chatState = { hsId:null, sysPrompt:"", messages:[], busy:false, voice:true };
function patientSystemPrompt(p){
  return `你是臨床模擬訓練中由 AI 扮演的「標準化病人或家屬」。以下是你的角色設定，全程以第一人稱、台灣口語繁體中文扮演，絕不跳出角色。
姓名：${p.name||"（未設定）"}，${p.age||"?"} 歲，${p.sex||""}
主訴/現況：${p.hpi||"（未設定）"}
過去病史/用藥/過敏：${p.pmh||"（未設定）"}
個性與說話風格：${p.persona||"一般"}
意識/身分：${p.mental||"清醒"}
隱藏劇本（學員問到才透露，不可主動全盤托出）：${p.hidden||"（無）"}
規則：一次回覆 1-3 句，像真實對話；只回答被問到的事；用一般民眾詞彙描述症狀；對學員態度有真實情緒反應；可偶爾用（簡短動作）描述；若被問「你是 AI 嗎」以角色身分困惑回應。`;
}
function cpAddMsg(cls, text){
  const d = document.createElement("div");
  d.className = "cp-msg " + cls; d.textContent = text;
  $("cpMsgs").appendChild(d); $("cpMsgs").scrollTop = $("cpMsgs").scrollHeight;
  return d;
}
async function openPatientChat(a, h){
  let p = a.patient || null;
  if(!p && a.caseId && db){   // 可直接引用 SimPatient 教案庫 sim_cases 的病人設定
    try{ const s = await getDoc(doc(db,"sim_cases",a.caseId)); if(s.exists()) p = (s.data().patient)||{}; }catch(e){}
  }
  if(!p) p = { name:a.title||"病人", persona:a.persona||"" };
  const id = (h&&h.id) || a.caseId || "chat";
  if(chatState.hsId !== id){ chatState.messages = []; $("cpMsgs").innerHTML = ""; }
  chatState.hsId = id;
  chatState.sysPrompt = patientSystemPrompt(p);
  chatState.voiceName = a.voice || null;   // 可依角色指定聲音（cmn-TW-Wavenet-A/B/C…）
  avatarShow(a.avatar || null);            // 對話角色特寫（會眨眼/對嘴型/表情）
  $("cpTitle").textContent = "🗣️ " + (a.title || p.name || "對話");
  $("chatPanel").classList.add("show");
  positionAvatar();
  if(!chatState.messages.length) cpAddMsg("sys","開始對話：輸入文字或按 🎤 說話");
  setTimeout(()=>$("cpInput").focus(), 100);
  logEvent("open_patient",{ id });
}
async function cpSend(){
  const t = $("cpInput").value.trim();
  if(!t || chatState.busy) return;
  $("cpInput").value = ""; cpAddMsg("user", t);
  chatState.messages.push({ role:"user", content:t });
  chatState.busy = true;
  avatarMode("thinking");
  const wait = cpAddMsg("ai","…");
  try{
    const r = await fetch(PROXY_URL, { method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ model:"claude-opus-4-8", max_tokens:600, system:chatState.sysPrompt, messages:chatState.messages }) });
    const d = await r.json();
    const text = (d.content && d.content[0] && d.content[0].text) || (d.error && d.error.message) || "（沒有回應）";
    wait.textContent = text;
    chatState.messages.push({ role:"assistant", content:text });
    avatarMode("idle");
    cpSpeak(text);

  chatState.busy = false;
  $("cpMsgs").scrollTop = $("cpMsgs").scrollHeight;
}

/* 台灣口音真人感語音：走 Google Cloud TTS（cmn-TW Wavenet）；失敗才退回瀏覽器合成音 */
const TTS_URL = "https://tts-mkargc7maa-uc.a.run.app";
let cpAudio = null;
async function cpSpeak(t){
  if(!chatState.voice) return;
  const clean = t.replace(/（[^）]*）/g,"").trim();   // 去掉（動作）描述
  if(!clean) return;
  if(cpAudio){ cpAudio.pause(); cpAudio = null; }
  if("speechSynthesis" in window) speechSynthesis.cancel();
  try{
    const r = await fetch(TTS_URL, { method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ text: clean, voice: chatState.voiceName || "cmn-TW-Wavenet-A", rate: 1.0 }) });
    if(!r.ok) throw new Error("tts "+r.status);
    const d = await r.json();
    if(!d.audio) throw new Error("no audio");
    cpAudio = new Audio("data:" + (d.mime || "audio/mp3") + ";base64," + d.audio);
    // 注意：不要把 <audio> 接進 WebAudio（data URI 經 MediaElementSource 會被視為 opaque
    // → 分析器全零、甚至整段消音）。嘴型改用音節節奏開合（analyser=null 走備援）。
    avState.analyser = null;
    avatarMode("speaking"); avLog("speaking start");
    cpAudio.onended = ()=>{ avLog("audio ended"); avatarMode("idle"); };
    cpAudio.onpause = ()=>{ avLog("audio pause"); avatarMode("idle"); };
    await cpAudio.play();
    avLog("play ok");
    return;
  }catch(e){ avLog("tts fail: " + (e && e.message || e)); /* 退回瀏覽器合成音 */ }
  if("speechSynthesis" in window){
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = "zh-TW"; u.rate = 1.05;
    const v = speechSynthesis.getVoices().find(v=>v.lang && v.lang.startsWith("zh"));
    if(v) u.voice = v;
    avState.analyser = null;                // 無振幅資料 → 規律開合
    avatarMode("speaking");
    u.onend = ()=> avatarMode("idle");
    speechSynthesis.speak(u);
  } else { avatarMode("idle"); }
}

/* ===== 角色動畫（多骨架同步）：對話特寫 + 場景內人物共用同一狀態機
       眨眼各自隨機、呼吸各自起伏；思考/說話表情與嘴型「同步」演出 ===== */
const AV_CACHE = {};
const rigs = new Map();   // key("bust"/"prop:<id>") → { el, hotspotId, breathe, blinkT, mouth, mode }
const avState = { name:null, raf:0, mode:"idle", log:[] };
window.__av = avState; window.__rigs = rigs;   // 除錯用
function avLog(m){ avState.log.push(Date.now()%100000 + " " + m); if(avState.log.length>40) avState.log.shift(); }
function registerRig(key, el, opts){
  const rig = { el, hotspotId:(opts&&opts.hotspotId)||null, breathe:!(opts&&opts.breathe===false),
    blinkT:0, mouth:0, mode:"idle" };
  const prep = (id, origin)=>{ const e = el.querySelector("#"+id);
    if(e){ e.style.transformBox="fill-box"; if(origin) e.style.transformOrigin=origin; e.style.transition="transform .25s"; } };
  prep("av-head","50% 88%"); prep("av-pupilL"); prep("av-pupilR"); prep("av-browL"); prep("av-browR");
  const body = el.querySelector("#av-body");
  if(body){ body.style.transformBox="fill-box"; body.style.transformOrigin="50% 100%"; }
  ["av-lidL","av-lidR"].forEach(id=>{ const e=el.querySelector("#"+id);
    if(e){ e.style.transformBox="fill-box"; e.style.transformOrigin="50% 0%"; } });
  rigs.set(key, rig);
  if(!avState.raf) avatarLoop();
}
function unregisterRig(key){ rigs.delete(key); }
async function avatarShow(name){
  const wrap = $("cpAvatarWrap");
  if(!name){ wrap.style.display="none"; avState.name=null; unregisterRig("bust"); return; }
  if(avState.name !== name){
    let txt = AV_CACHE[name];
    if(!txt){
      try{ const r = await fetch("images/props/"+name+".svg"); if(!r.ok) throw 0; txt = await r.text(); AV_CACHE[name]=txt; }
      catch(e){ wrap.style.display="none"; avState.name=null; return; }
    }
    $("cpAvatar").innerHTML = txt;
    avState.name = name;
    registerRig("bust", $("cpAvatar"), { breathe:true });
  }
  wrap.style.display="block";
  positionAvatar();
  if(!avState.raf) avatarLoop();
}
function positionAvatar(){
  const p = $("chatPanel"), w = $("cpAvatarWrap");
  if(p.classList.contains("show")) w.style.bottom = (14 + p.offsetHeight - 6) + "px";
}
window.addEventListener("resize", positionAvatar);
function avatarMode(m){ avState.mode = m; }   // 套用交給 avatarLoop 逐骨架處理
function applyRigMode(rig, m){
  const q = id => rig.el.querySelector("#"+id);
  const head=q("av-head"), bl=q("av-browL"), br=q("av-browR"), pl=q("av-pupilL"), pr=q("av-pupilR");
  if(m === "thinking"){        // 思考：頭微傾、眼神飄向側上、眉微挑
    if(head) head.style.transform = "rotate(-2.5deg)";
    if(pl) pl.style.transform = "translate(3px,-3px)";
    if(pr) pr.style.transform = "translate(3px,-3px)";
    if(bl) bl.style.transform = "translateY(-3px)";
    if(br) br.style.transform = "translateY(-1.5px)";
  } else {                     // 說話/待機：回正、看著對方
    if(head) head.style.transform = "";
    if(pl) pl.style.transform = ""; if(pr) pr.style.transform = "";
    if(bl) bl.style.transform = ""; if(br) br.style.transform = "";
  }
}
/* 嘴型採音節節奏開合（約 5 次/秒 + 慢速強弱），不接 WebAudio 分析器：
   data URI 音訊經 createMediaElementSource 會被當 opaque 來源 → 全零甚至消音。 */
function avatarLoop(){
  if(rigs.size === 0){ avState.raf = 0; return; }
  avState.raf = requestAnimationFrame(avatarLoop);
  const t = performance.now();
  const chatOn = $("chatPanel").classList.contains("show");
  rigs.forEach((rig, key)=>{
    const q = id => rig.el.querySelector("#"+id);
    // 這個骨架是否參與目前的對話（特寫必然參與；場景人物須連到目前對話的熱點）
    const active = key==="bust" ? true : (chatOn && rig.hotspotId && rig.hotspotId === chatState.hsId);
    const mode = active ? avState.mode : "idle";
    if(rig.mode !== mode){ rig.mode = mode; applyRigMode(rig, mode); }
    const body = q("av-body");
    if(body && rig.breathe) body.style.transform = `translateY(${(Math.sin(t/1400)*1.5).toFixed(2)}px)`;
    if(mode === "speaking"){
      const head = q("av-head");
      if(head) head.style.transform = `rotate(${(Math.sin(t/300)*0.8).toFixed(2)}deg)`;
    }
    if(t > rig.blinkT){ rigBlink(rig); rig.blinkT = t + 1800 + Math.random()*3200; }
    let target = 0;
    if(mode === "speaking")
      target = (0.1 + 0.85*Math.abs(Math.sin(t/95))) * (0.5 + 0.5*Math.abs(Math.sin(t/487)));
    rig.mouth += (target - rig.mouth) * 0.5;
    const mo = q("av-mouth-open"), mc = q("av-mouth-closed");
    if(mo) mo.style.transform = `scaleY(${(0.08 + 0.92*rig.mouth).toFixed(3)})`;
    if(mc) mc.style.opacity = String(Math.max(0, 1 - rig.mouth*1.7));
  });
}
function rigBlink(rig){
  ["av-lidL","av-lidR"].forEach(id=>{
    const e = rig.el.querySelector("#"+id); if(!e) return;
    e.style.transition = "transform .07s";
    e.style.transform = "scaleY(1)";
    setTimeout(()=>{ e.style.transform = "scaleY(0)"; }, 95);
  });
}
// 語音輸入：台語角色走雅婷即時 ASR（國台語混講），其餘走瀏覽器 webkitSpeechRecognition
const STT_URL = "https://stt-mkargc7maa-uc.a.run.app";
const CP_SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let cpRec = null;
$("cpMic").onclick = ()=>{
  if(chatState.voiceName && /^yating:tai/.test(chatState.voiceName)){ yatingMicToggle(); return; }
  if(!CP_SR){ cpAddMsg("sys","此瀏覽器不支援語音輸入，請改用文字"); return; }

// ===== 雅婷即時語音辨識（wss 串流 16kHz PCM；token 由後端換發，金鑰不落地） =====
let ytRec = null;
async function yatingMicToggle(){
  if(ytRec){ yatingMicStop(); return; }
  $("cpMic").classList.add("on");
  try{
    const tk = await fetch(STT_URL, { method:"POST", headers:{ "content-type":"application/json" },
      body: JSON.stringify({ pipeline:"asr-zh-tw-std" }) }).then(r=>r.json());
    if(!tk.token) throw new Error((tk.error&&tk.error.message)||"token 取得失敗");
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    const ws = new WebSocket("wss://asr.api.yating.tw/ws/v1/?token="+tk.token);
    ws.binaryType = "arraybuffer";
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    await ctx.resume();
    const src = ctx.createMediaStreamSource(stream);
    const node = ctx.createScriptProcessor(4096, 1, 1);
    const mute = ctx.createGain(); mute.gain.value = 0;   // 不回放，避免回授
    let pend = new Int16Array(0), open = false, got = false;
    ws.onmessage = ev=>{
      let m; try{ m = JSON.parse(ev.data); }catch(e){ return; }
      if(m.status === "ok"){ open = true; return; }
      if(m.status === "error"){ cpAddMsg("sys","台語辨識錯誤："+(m.detail||"")); yatingMicStop(); return; }
      const p = m.pipe || {};
      if(p.asr_sentence){ $("cpInput").value = p.asr_sentence; got = true; }
      if(p.asr_final){ yatingMicStop(); if($("cpInput").value.trim()) cpSend(); }
    };
    ws.onerror = ()=>{ cpAddMsg("sys","台語語音辨識連線失敗，請改用文字"); yatingMicStop(); };
    ws.onclose = ()=>{ if(ytRec) yatingMicStop(); };
    node.onaudioprocess = e=>{
      if(!open || ws.readyState !== 1) return;
      const f = e.inputBuffer.getChannelData(0);
      const ratio = ctx.sampleRate / 16000, n = Math.floor(f.length / ratio);
      const out = new Int16Array(n);
      for(let i=0;i<n;i++){ const v = f[Math.floor(i*ratio)]; out[i] = Math.max(-1, Math.min(1, v)) * 0x7FFF; }
      const all = new Int16Array(pend.length + out.length); all.set(pend); all.set(out, pend.length);
      let off = 0;
      while(all.length - off >= 1000){ ws.send(all.subarray(off, off+1000).slice().buffer); off += 1000; }  // 2000 bytes/塊
      pend = all.subarray(off).slice();
    };
    src.connect(node); node.connect(mute); mute.connect(ctx.destination);
    ytRec = { ws, ctx, node, stream };
    cpAddMsg("sys","🎤 請說話（台語/國語皆可），說完稍停會自動送出；再按一次 🎤 取消");
  }catch(e){
    $("cpMic").classList.remove("on"); ytRec = null;
    cpAddMsg("sys","無法啟動台語語音辨識："+(e.message||e));
  }
}
function yatingMicStop(){
  const r = ytRec; ytRec = null;
  $("cpMic").classList.remove("on");
  if(!r) return;
  try{ r.node.disconnect(); }catch(e){}
  try{ r.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
  try{ r.ctx.close(); }catch(e){}
  try{ if(r.ws.readyState === 1) r.ws.send(new ArrayBuffer(0)); r.ws.close(); }catch(e){}
}

function followMonPanel(){
  cancelAnimationFrame(mpRAF);
  const step = ()=>{
    const p = $("monPanel");
    if(!p.dataset.open) return;
    const a = document.querySelector(`.hswrap[data-hs="${mpAnchorId}"]`);
    const r = a ? a.getBoundingClientRect() : null;
    const inView = r && r.width>0 && r.right>0 && r.left<innerWidth && r.bottom>0 && r.top<innerHeight;
    if(!inView){ p.style.display="none"; }          // 監視器離開視線 → 隱藏（iframe 保持運作）
    else{
      p.style.display="block";
      const pw = p.offsetWidth || 320, ph = p.offsetHeight || 270;
      let x = r.right + 12;                          // 預設貼在熱點右側
      if(x + pw > innerWidth - 8) x = r.left - pw - 12;   // 右邊放不下改放左側
      x = Math.max(8, Math.min(x, innerWidth - pw - 8));
      let y = Math.max(56, Math.min(r.top - 40, innerHeight - ph - 12));
      p.style.left = x + "px"; p.style.top = y + "px";
    }
    mpRAF = requestAnimationFrame(step);
  };
  mpRAF = requestAnimationFrame(step);
}

/* ---------- 除錯總結畫面 ---------- */
function showDebrief(){
  closeModal();
  const secs = startTime ? Math.round((Date.now()-startTime)/1000) : 0;
  const mmss = `${String(Math.floor(secs/60)).padStart(2,"0")}:${String(secs%60).padStart(2,"0")}`;
  // 全教案危害統計
  let hzTotal=0; tour.scenes.forEach(s=>hzTotal += (s.hotspots||[]).filter(h=>h.type==="hazard").length);
  const pass = score >= (tour.debrief?.passScore ?? 0);
  const showMist = tour.debrief?.showMistakes !== false;
  let html = `<h2>情境總結</h2>`;
  html += `<div class="big ${pass?'pass':'fail'}">${score} 分</div>`;
  if(tour.debrief?.passScore!=null) html += `<div class="verdict">${pass?"✅ 通過":"❌ 未達標"}（通過門檻 ${tour.debrief.passScore} 分）</div>`;
  html += `<div class="stat"><span>花費時間</span><b>${mmss}</b></div>`;
  html += `<div class="stat"><span>測驗答對</span><b>${quizCorrect} / ${quizTotal||0}</b></div>`;
  if(hzTotal) html += `<div class="stat"><span>找到危害</span><b>${foundHazards.size} / ${hzTotal}</b></div>`;
  if(showMist){
    html += `<ul class="mist">`;
    if(mistakes.length) mistakes.forEach(m=> html += `<li>⚠️ ${m}</li>`);
    else html += `<li class="okitem">👍 沒有記錄到錯誤，表現良好！</li>`;
    html += `</ul>`;
  }
  // 團隊模式：TRM 行為標記統計（教師觀察）
  if(team && teamEvents.some(e=>e.type==="trm")){
    const dims = { A:"警覺", C:"溝通", S:"互助", L:"領導" };
    html += `<h3 style="margin:14px 0 6px">TRM 行為觀察</h3>`;
    Object.keys(dims).forEach(k=>{
      const good = teamEvents.filter(e=>e.type==="trm"&&e.dim===k&&e.ok).length;
      const bad  = teamEvents.filter(e=>e.type==="trm"&&e.dim===k&&!e.ok).length;
      if(good||bad) html += `<div class="stat"><span>${dims[k]}</span><b>👍 ${good}　△ ${bad}</b></div>`;
    });
    const noted = teamEvents.filter(e=>e.type==="trm"&&e.target);
    if(noted.length){
      html += `<ul class="mist">`;
      noted.slice(0,8).forEach(e=> html += `<li>${e.ok?"👍":"⚠️"} ${esc2(e.label)}</li>`);
      html += `</ul>`;
    }
  }
  html += `<div class="foot">
    <button class="btn ghost" id="dbClose">繼續情境</button>
    <button class="btn primary" id="dbRestart">重新開始</button>
  </div>`;
  $("debriefBody").innerHTML = html;
  $("debrief").classList.add("show");
  $("dbClose").onclick = ()=> $("debrief").classList.remove("show");
  $("dbRestart").onclick = ()=> location.reload();
  logEvent("finish",{ score, secs, quizCorrect, quizTotal, hazards:foundHazards.size, hzTotal, pass });
  saveProgress();
}

/* ---------- 啟動 ---------- */
$("gateStart").onclick = start;
$("gateName").addEventListener("keydown", e=>{ if(e.key==="Enter") start(); });
async function start(){
  student = ($("gateName").value||"").trim();
  if(!student){ $("gateName").focus(); return; }
  const monParam = new URLSearchParams(location.search).get("mon");
  monCode = (($("gateMon").value||"") || monParam || "").trim().replace(/\D/g,"");
  if(monCode){ $("monCodeVal").textContent = monCode; $("monLink").style.display="block"; }
  await loadTour();
  vars = Object.assign({}, tour.variables || {});   // 初始化情境變數
  const teamCode = ($("gateTeam").value||"").trim().replace(/\D/g,"").slice(0,6);
  if(teamCode){ await joinTeam(teamCode, $("gateRole").value || "support"); }
  startTime = Date.now();
  $("gateTitle").textContent = tour.title;
  $("tTitle").textContent = tour.title;
  const resumeScene = await loadProgress();
  $("gate").style.display="none";
  const startId = resumeScene || tour.startSceneId || tour.scenes[0].id;
  logEvent("start",{});
  renderScene(tour.scenes.find(s=>s.id===startId) || tour.scenes[0]);
  checkStages();   // 關卡系統：揭示第一關任務 + 顯示 HUD
}
// 教案選單：內建示範＋tour_defs 全部教案；?tour= 參數可預選
async function initTourPicker(){
  const sel = $("gateTour");
  const urlTid = new URLSearchParams(location.search).get("tour") || "demo";
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  let opts = [{ id:"demo", title: DEMO.title+"（示範）" }];
  try{
    const snap = await getDocs(collection(db, C_DEFS));
    snap.docs.forEach(d=>{ if(d.id===DEMO.id) return;   // 內建示範已在清單首位，略過資料庫舊複本
      const t=d.data()||{}; opts.push({ id:d.id, title:(t.title||d.id) }); });
  }catch(e){ console.warn("tour list", e); }
  const head = opts.shift();
  opts.sort((a,b)=>a.title.localeCompare(b.title,"zh-Hant"));
  opts.unshift(head);
  sel.innerHTML = opts.map(o=>`<option value="${esc(o.id)}">${esc(o.title)}</option>`).join("");
  sel.value = opts.some(o=>o.id===urlTid) ? urlTid : "demo";
  const updateTitle = ()=>{
    const o = opts.find(x=>x.id===sel.value);
    $("gateTitle").textContent = o ? o.title.replace("（示範）","") : DEMO.title;
  };
  sel.onchange = updateTitle;
  updateTitle();
}
initTourPicker();
</script>
