<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>課堂即時文字雲</title>
<style>
  :root{ --navy:#1E2761; --blue:#2B7DE9; --ink:#333; --line:#e3e8f0; --bg:#f5f7fb; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
  }
  /* ===== 學員填寫模式 ===== */
  .wrap{ max-width:560px; margin:0 auto; padding:16px; }
  header.hero{ background:var(--navy); color:#fff; border-radius:14px; padding:20px; margin-bottom:14px; }
  header.hero .tag{ font-size:.78rem; opacity:.75; letter-spacing:.1em; }
  header.hero h1{ font-size:1.25rem; line-height:1.5; margin-top:6px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 16px; margin-bottom:12px; }
  .inrow{ display:flex; gap:10px; }
  .inrow input{
    flex:1; border:1.5px solid var(--line); border-radius:12px; padding:13px 14px;
    font-size:1.05rem; font-family:inherit;
  }
  .inrow input:focus{ outline:none; border-color:var(--blue); }
  .inrow button{
    background:var(--blue); color:#fff; border:none; border-radius:12px; padding:0 22px;
    font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .inrow button:disabled{ opacity:.5; }
  .hint{ font-size:.8rem; color:#8b94a6; margin-top:10px; }
  .minicloud{ display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; justify-content:center; padding:8px 0; min-height:60px; }
  .minicloud span{ color:var(--navy); font-weight:700; }
  .minicloud .empty{ color:#a0a8b8; font-weight:400; font-size:.85rem; }
  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:#333; color:#fff; padding:9px 18px; border-radius:999px; font-size:.88rem;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:50; white-space:nowrap;
  }
  #toast.show{ opacity:.95; }
  /* ===== 投影模式 ===== */
  #board{
    display:none; position:fixed; inset:0; background:var(--navy); color:#fff;
    flex-direction:column; padding:2.5vh 2.5vw;
  }
  #board .b-top{ display:flex; align-items:flex-start; gap:2vw; }
  #board .b-q{ flex:1; font-size:min(4.6vh,3vw); font-weight:800; line-height:1.4; }
  #board .b-side{ text-align:center; flex:0 0 auto; }
  #board .b-qr{ background:#fff; border-radius:12px; padding:8px; display:inline-block; }
  #board .b-qr img, #board .b-qr canvas{ display:block; width:15vh; height:15vh; }
  #board .b-url{ font-size:1.4vh; opacity:.65; margin-top:4px; }
  #board .b-count{ font-size:2vh; margin-top:4px; color:#9fc3ff; font-weight:700; }
  #cloudBox{ flex:1; position:relative; min-height:0; margin-top:1vh; }
  #cloudCanvas{ position:absolute; inset:0; width:100%; height:100%; }
  #tagCloud{
    position:absolute; inset:0; display:flex; flex-wrap:wrap; gap:1.2vh 2.5vw;
    align-items:center; justify-content:center; align-content:center; overflow:hidden;
  }
  #tagCloud span{ font-weight:800; line-height:1.15; }
  #board .b-empty{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:3vh; opacity:.45;
  }
  #board .b-ctrl{ display:flex; gap:10px; justify-content:flex-end; }
  #board .b-ctrl button{
    background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25);
    border-radius:8px; padding:6px 14px; font-size:1.6vh; cursor:pointer; font-family:inherit;
  }
  #board .b-ctrl button:hover{ background:rgba(255,255,255,.22); }
</style>
</head>
<body>

<!-- ===== 學員填寫 ===== -->
<div class="wrap" id="studentView">
  <header class="hero">
    <div class="tag">課堂即時互動</div>
    <h1 id="sQuestion">載入題目中…</h1>
  </header>
  <div class="card">
    <div class="inrow">
      <input id="wordInput" maxlength="12" placeholder="輸入一個詞(最多 12 字)" autocomplete="off">
      <button id="sendBtn">送出</button>
    </div>
    <div class="hint" id="quotaHint">可送出 5 次,每次一個詞或短語</div>
  </div>
  <div class="card">
    <div class="hint" style="margin:0 0 6px">大家目前的回答</div>
    <div class="minicloud" id="miniCloud"><span class="empty">還沒有人回答,搶頭香!</span></div>
  </div>
</div>

<!-- ===== 投影文字雲 ===== -->
<div id="board">
  <div class="b-top">
    <div class="b-q" id="bQuestion">載入題目中…</div>
    <div class="b-side">
      <div class="b-qr" id="bQr"></div>
      <div class="b-url" id="bUrl"></div>
      <div class="b-count"><span id="bCount">0</span> 則回覆</div>
    </div>
  </div>
  <div id="cloudBox">
    <canvas id="cloudCanvas"></canvas>
    <div id="tagCloud" style="display:none"></div>
    <div class="b-empty" id="bEmpty">等待學員回覆中…掃右上角 QR code 加入</div>
  </div>
  <div class="b-ctrl">
    <button id="btnQ">更換題目</button>
    <button id="btnClear">清空重來</button>
    <button id="btnFull">全螢幕</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, setDoc, getDocs, deleteDoc, onSnapshot, query, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyB69FLelljxOJUd73hNXmYLEptXNwHYtGw",
  authDomain:"insim-research.firebaseapp.com",
  projectId:"insim-research",
  storageBucket:"insim-research.firebasestorage.app",
  messagingSenderId:"440647871490",
  appId:"1:440647871490:web:3f3b761b96bf1b10a18b1b"
};
let db=null;
try{ db=getFirestore(initializeApp(firebaseConfig)); }catch(e){ console.warn("Firebase init failed", e); }

const $=id=>document.getElementById(id);
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove("show"),2000); }

const COLL="wordcloud_words";
const params=new URLSearchParams(location.search);
const ROOM=(params.get("room")||"ai").replace(/[^A-Za-z0-9_-]/g,"").slice(0,20)||"ai";
const IS_BOARD=params.has("board");
const DEFAULT_Q="聽到「生成式 AI」,你第一個想到的詞是?";
const META_ID="meta_"+ROOM;
const MAX_SEND=5;

const wordsQuery=query(collection(db,COLL), where("room","==",ROOM));
let WORDS=[];   // [{text,t}]
let QTEXT=DEFAULT_Q;

function aggregate(){
  const counts={};
  WORDS.forEach(w=>{ const k=w.text; counts[k]=(counts[k]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
}

/* ================= 學員模式 ================= */
if(!IS_BOARD){
  const sentKey="wc_sent_"+ROOM;
  const sentCount=()=>parseInt(localStorage.getItem(sentKey)||"0",10);
  const updateQuota=()=>{
    const left=MAX_SEND-sentCount();
    $("quotaHint").textContent = left>0 ? `還可送出 ${left} 次,每次一個詞或短語` : "已達送出上限,謝謝你的參與!";
    $("sendBtn").disabled = left<=0;
    $("wordInput").disabled = left<=0;
  };
  updateQuota();

  async function send(){
    const v=$("wordInput").value.trim().replace(/\s+/g," ").slice(0,12);
    if(!v){ toast("請先輸入一個詞"); return; }
    if(sentCount()>=MAX_SEND){ updateQuota(); return; }
    $("sendBtn").disabled=true;
    try{
      await addDoc(collection(db,COLL), { room:ROOM, kind:"word", text:v, t:Date.now() });
      localStorage.setItem(sentKey, String(sentCount()+1));
      $("wordInput").value="";
      toast("已送出:"+v);
    }catch(e){ console.error(e); toast("送出失敗,請再試一次"); }
    updateQuota();
  }
  $("sendBtn").addEventListener("click", send);
  $("wordInput").addEventListener("keydown", e=>{ if(e.key==="Enter") send(); });

  function renderMini(){
    const entries=aggregate().slice(0,40);
    const box=$("miniCloud");
    if(!entries.length){ box.innerHTML='<span class="empty">還沒有人回答,搶頭香!</span>'; return; }
    const mx=entries[0][1];
    box.innerHTML=entries.map(([w,n])=>{
      const size=(0.9+1.3*Math.sqrt((n-1)/Math.max(1,mx-1||1))).toFixed(2);
      const op=(0.55+0.45*n/mx).toFixed(2);
      return `<span style="font-size:${size}rem;opacity:${op}">${esc(w)}</span>`;
    }).join("");
  }

  onSnapshot(wordsQuery, snap=>{
    const rows=snap.docs.map(d=>d.data());
    QTEXT=(rows.find(r=>r.kind==="meta")||{}).question || DEFAULT_Q;
    WORDS=rows.filter(r=>r.kind==="word");
    $("sQuestion").textContent=QTEXT;
    renderMini();
  }, e=>{ console.error(e); $("sQuestion").textContent="連線失敗,請重新整理"; });
}

/* ================= 投影模式(?board=1) ================= */
if(IS_BOARD){
  document.getElementById("studentView").style.display="none";
  const b=$("board"); b.style.display="flex";

  const studentUrl=location.origin+location.pathname+(ROOM!=="ai"?("?room="+ROOM):"");
  $("bUrl").textContent=studentUrl.replace(/^https?:\/\//,"");
  try{
    new QRCode($("bQr"), { text:studentUrl, width:256, height:256, correctLevel:QRCode.CorrectLevel.M });
  }catch(e){
    $("bQr").innerHTML='<img src="https://api.qrserver.com/v1/create-qr-code/?size=256x256&data='+encodeURIComponent(studentUrl)+'" alt="QR">';
  }

  const PALETTE=["#ffffff","#9fc3ff","#ffd166","#7ee8b2","#ff9eb5","#c9b6ff"];
  let renderTimer=null;

  function renderCloud(){
    const entries=aggregate();
    $("bCount").textContent=WORDS.length;
    $("bEmpty").style.display = entries.length? "none":"flex";
    const box=$("cloudBox"), cv=$("cloudCanvas");
    if(!entries.length){ const ctx=cv.getContext("2d"); ctx&&ctx.clearRect(0,0,cv.width,cv.height); $("tagCloud").innerHTML=""; return; }
    const W=box.clientWidth, H=box.clientHeight;
    const mx=entries[0][1];
    if(window.WordCloud){
      cv.style.display="block"; $("tagCloud").style.display="none";
      cv.width=W*2; cv.height=H*2;   // 2x 供高解析螢幕
      const base=Math.min(W,H)/9;
      WordCloud(cv, {
        list: entries.map(([w,n])=>[w, (0.55+0.9*Math.sqrt(n/mx))*base*2 ]),
        gridSize: Math.round(base/3),
        fontFamily:'"PingFang TC","Microsoft JhengHei",sans-serif',
        fontWeight:"800",
        color: ()=>PALETTE[Math.floor(Math.random()*PALETTE.length)],
        backgroundColor:"transparent",
        rotateRatio:0.25, rotationSteps:2, minRotation:-Math.PI/2, maxRotation:Math.PI/2,
        drawOutOfBound:false, shrinkToFit:true, shuffle:true,
      });
    }else{
      cv.style.display="none"; const tc=$("tagCloud"); tc.style.display="flex";
      tc.innerHTML=entries.slice(0,60).map(([w,n],i)=>{
        const vh=(2.4+5.2*Math.sqrt(n/mx)).toFixed(2);
        return `<span style="font-size:${vh}vh;color:${PALETTE[i%PALETTE.length]}">${esc(w)}</span>`;
      }).join("");
    }
  }
  const scheduleRender=()=>{ clearTimeout(renderTimer); renderTimer=setTimeout(renderCloud, 700); };

  onSnapshot(wordsQuery, snap=>{
    const rows=snap.docs.map(d=>({id:d.id, ...d.data()}));
    QTEXT=(rows.find(r=>r.kind==="meta")||{}).question || DEFAULT_Q;
    WORDS=rows.filter(r=>r.kind==="word");
    $("bQuestion").textContent=QTEXT;
    scheduleRender();
  }, e=>{ console.error(e); $("bQuestion").textContent="連線失敗,請重新整理"; });

  window.addEventListener("resize", scheduleRender);

  $("btnQ").addEventListener("click", async ()=>{
    const q=prompt("輸入新的題目:", QTEXT);
    if(q===null) return;
    const nq=q.trim().slice(0,60)||DEFAULT_Q;
    try{ await setDoc(doc(db,COLL,META_ID), { room:ROOM, kind:"meta", question:nq, t:Date.now() }); toast("題目已更新"); }
    catch(e){ toast("更新失敗:"+(e.message||e)); }
  });
  $("btnClear").addEventListener("click", async ()=>{
    if(!confirm("確定清空這一輪的所有回覆?")) return;
    try{
      const snap=await getDocs(wordsQuery);
      const dels=snap.docs.filter(d=>d.data().kind==="word").map(d=>deleteDoc(doc(db,COLL,d.id)));
      await Promise.all(dels);
      toast("已清空 "+dels.length+" 則");
    }catch(e){ toast("清空失敗:"+(e.message||e)); }
  });
  $("btnFull").addEventListener("click", ()=>{
    if(document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen();
  });
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
