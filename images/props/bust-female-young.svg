      <path d="M 265 441 C 254 449 246 452 240 452" fill="none" stroke="#D69B72" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
      <!-- hospital gown -->
      <path d="M 74 560 L 78 508 C 83 471 111 451 151 443 C 180 437 202 431 213 424 L 240 464 L 267 424 C 278 431 300 437 329 443 C 369 451 397 471 402 508 L 406 560 Z" fill="url(#gownGrad)"/>
      <!-- neckline piping -->
      <path d="M 213 424 L 240 464 L 267 424" fill="none" stroke="#CBDDF3" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
      <!-- shoulder snaps (patient gown) -->
      <circle cx="136" cy="456" r="3" fill="#7FA0C8"/>
      <circle cx="154" cy="451" r="3" fill="#7FA0C8"/>
      <circle cx="172" cy="447" r="3" fill="#7FA0C8"/>
      <!-- gown folds -->
      <path d="M 150 470 C 165 492 172 522 174 558" fill="none" stroke="#8FB0D6" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      <path d="M 330 470 C 315 492 308 522 306 558" fill="none" stroke="#8FB0D6" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      <path d="M 226 492 C 224 516 226 540 230 558" fill="none" stroke="#8FB0D6" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
      <path d="M 254 492 C 256 516 254 540 250 558" fill="none" stroke="#8FB0D6" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
      <path d="M 96 502 C 104 482 112 468 124 460" fill="none" stroke="#8FB0D6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M 384 502 C 376 482 368 468 356 460" fill="none" stroke="#8FB0D6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <!-- shoulder highlight -->
      <path d="M 116 452 C 138 444 164 439 186 434" fill="none" stroke="#C9DDF4" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <path d="M 364 452 C 342 444 316 439 294 434" fill="none" stroke="#C9DDF4" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    </g>

