      <!-- nose -->
      <path d="M 233 222 C 231 236 230.5 248 231.5 258" fill="none" stroke="#DCA47E" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
      <path d="M 247 222 C 249 236 249.5 248 248.5 258" fill="none" stroke="#DCA47E" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
      <path d="M 227 262 C 225 270 226 276 231 279 C 235 281.5 245 281.5 249 279 C 254 276 255 270 253 262 C 249 271 231 271 227 262 Z" fill="#D69B72" opacity="0.55"/>
      <ellipse cx="231.5" cy="277" rx="3.2" ry="2" fill="#A9714F" opacity="0.8"/>
      <ellipse cx="248.5" cy="277" rx="3.2" ry="2" fill="#A9714F" opacity="0.8"/>
      <!-- philtrum -->
      <path d="M 240 284 L 240 296" fill="none" stroke="#D9A37E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

      <!-- mouth -->
      <g id="av-mouth">
        <path id="av-mouth-closed" d="M 213 306.5 C 220 300 231 297.5 240 299.5 C 249 297.5 260 300 267 306.5 C 263 313.5 252.5 317.5 240 317.5 C 227.5 317.5 217 313.5 213 306.5 Z" fill="#C08370"/>
        <g id="av-mouth-open" style="transform:scaleY(0.08);transform-box:fill-box;transform-origin:50% 50%">
          <path d="M 213 303 C 219 295.5 261 295.5 267 303 C 266 312 255 319 240 319 C 225 319 214 312 213 303 Z" fill="#5A2F2A"/>
          <g clip-path="url(#mouthClip)">
            <rect x="221" y="296" width="38" height="9" rx="3" fill="#F8F4EF"/>
            <ellipse cx="240" cy="313" rx="13" ry="6.5" fill="#C96B60"/>
          </g>
        </g>
      </g>
      <!-- downturned mouth-corner shadows -->
      <path d="M 212 307 C 209.5 310 208.5 313 209.5 315.5" fill="none" stroke="#B26E58" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
      <path d="M 268 307 C 270.5 310 271.5 313 270.5 315.5" fill="none" stroke="#B26E58" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
      <!-- chin shading -->
      <ellipse cx="240" cy="326" rx="12" ry="4" fill="#D08F68" opacity="0.5"/>

      <!-- front hair swept back into the low ponytail -->
      <path d="M 240 58 C 165 58 122 104 118 170 C 118 186 120 200 124 212 C 130 176 142 148 164 134 C 186 120 214 122 232 110 C 236 107 239 103 240 98 C 241 103 244 107 248 110 C 266 122 294 120 316 134 C 338 148 350 176 356 212 C 360 200 362 186 362 170 C 358 104 315 58 240 58 Z" fill="url(#hairGrad)"/>
      <path d="M 120 168 C 114 200 116 232 124 262 C 132 246 138 224 142 202 C 145 186 138 174 120 168 Z" fill="url(#hairGrad)"/>
      <path d="M 360 168 C 366 200 364 232 356 262 C 348 246 342 224 338 202 C 335 186 342 174 360 168 Z" fill="url(#hairGrad)"/>
      <!-- crown highlight -->
      <path d="M 170 92 C 196 74 240 68 268 74" fill="none" stroke="#55443A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
      <!-- messy stray hairs -->
      <path d="M 154 118 C 140 98 134 84 140 70" fill="none" stroke="#2A211C" stroke-width="2" stroke-linecap="round"/>
      <path d="M 168 104 C 158 88 156 74 162 62" fill="none" stroke="#2A211C" stroke-width="2" stroke-linecap="round"/>
      <path d="M 326 116 C 340 96 346 82 340 72" fill="none" stroke="#2A211C" stroke-width="2" stroke-linecap="round"/>
      <path d="M 312 102 C 322 86 324 72 318 62" fill="none" stroke="#2A211C" stroke-width="2" stroke-linecap="round"/>
      <path d="M 158 250 C 152 284 156 314 168 336" fill="none" stroke="#2A211C" stroke-width="3" stroke-linecap="round"/>
      <path d="M 322 246 C 328 278 324 306 314 326" fill="none" stroke="#2A211C" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
</svg>
