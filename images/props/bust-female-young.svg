<svg viewBox="0 0 480 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDC0A0"/>
      <stop offset="0.55" stop-color="#E8B48E"/>
      <stop offset="1" stop-color="#DBA47F"/>
    </linearGradient>
    <linearGradient id="neckGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D69B72"/>
      <stop offset="0.5" stop-color="#E2AC85"/>
      <stop offset="1" stop-color="#E8B48E"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#453731"/>
      <stop offset="0.5" stop-color="#31261F"/>
      <stop offset="1" stop-color="#211A16"/>
    </linearGradient>
    <linearGradient id="gownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8D2EE"/>
      <stop offset="0.45" stop-color="#A9C7E8"/>
      <stop offset="1" stop-color="#9ABAE0"/>
    </linearGradient>
    <clipPath id="mouthClip">
      <path d="M 213 303 C 219 295.5 261 295.5 267 303 C 266 312 255 319 240 319 C 225 319 214 312 213 303 Z"/>
    </clipPath>
  </defs>

  <g id="avatar-root">
