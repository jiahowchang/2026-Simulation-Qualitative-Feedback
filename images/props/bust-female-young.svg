    <g id="av-body">
      <!-- neck + chest skin -->
      <path d="M 206 318 L 206 392 C 206 420 214 444 228 462 C 234 470 246 470 252 462 C 266 444 274 420 274 392 L 274 318 Z" fill="url(#neckGrad)"/>
      <!-- shadow cast by the chin on the neck -->
      <path d="M 206 340 C 220 355 260 355 274 340 L 274 370 C 261 382 219 382 206 370 Z" fill="#CE9166" opacity="0.8"/>
      <!-- clavicle hints -->
