        <path d="M 178 234 C 184 226 195 222.5 204 224.5 C 210.5 226 215 229.6 217.5 234 C 214 240.5 206 244.5 197 244.5 C 189 244.5 181.5 240.3 178 234 Z" fill="#F5EFE9"/>
        <circle cx="197.5" cy="234.5" r="8.6" fill="#4A3226"/>
        <circle cx="197.5" cy="234.5" r="8.6" fill="none" stroke="#33221A" stroke-width="1" opacity="0.6"/>
        <circle id="av-pupilL" cx="197.5" cy="234.5" r="3.9" fill="#1D130E"/>
        <circle cx="194.6" cy="231.4" r="1.7" fill="#FFFFFF" opacity="0.9"/>
        <circle cx="200.5" cy="237.5" r="0.9" fill="#FFFFFF" opacity="0.5"/>
        <path d="M 177 233 C 184 224.5 196 221.5 206 224 C 211.5 225.4 215.5 228.5 218 233" fill="none" stroke="#4A2F22" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
        <rect id="av-lidL" x="172" y="219.5" width="50" height="29" rx="8" fill="#E8B48E" style="transform:scaleY(0);transform-box:fill-box;transform-origin:50% 0%"/>
      </g>
      <!-- right eye -->
      <g id="av-eyeR">
        <path d="M 302 234 C 296 226 285 222.5 276 224.5 C 269.5 226 265 229.6 262.5 234 C 266 240.5 274 244.5 283 244.5 C 291 244.5 298.5 240.3 302 234 Z" fill="#F5EFE9"/>
        <circle cx="282.5" cy="234.5" r="8.6" fill="#4A3226"/>
        <circle cx="282.5" cy="234.5" r="8.6" fill="none" stroke="#33221A" stroke-width="1" opacity="0.6"/>
        <circle id="av-pupilR" cx="282.5" cy="234.5" r="3.9" fill="#1D130E"/>
        <circle cx="279.6" cy="231.4" r="1.7" fill="#FFFFFF" opacity="0.9"/>
        <circle cx="285.5" cy="237.5" r="0.9" fill="#FFFFFF" opacity="0.5"/>
        <path d="M 303 233 C 296 224.5 284 221.5 274 224 C 268.5 225.4 264.5 228.5 262 233" fill="none" stroke="#4A2F22" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
        <rect id="av-lidR" x="258" y="219.5" width="50" height="29" rx="8" fill="#E8B48E" style="transform:scaleY(0);transform-box:fill-box;transform-origin:50% 0%"/>
