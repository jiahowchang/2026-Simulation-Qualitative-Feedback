      <path d="M 240 56 C 148 56 104 120 104 202 C 104 274 116 330 138 362 C 146 373 160 372 166 361 C 172 350 172 330 170 310 C 200 330 280 330 310 310 C 308 330 308 350 314 361 C 320 372 334 373 342 362 C 364 330 376 274 376 202 C 376 120 332 56 240 56 Z" fill="url(#hairGrad)"/>
      <!-- low ponytail spilling over the left shoulder -->
      <path d="M 150 336 C 136 366 130 408 138 450 C 144 482 158 500 172 494 C 182 470 182 428 178 392 C 175 366 166 346 150 336 Z" fill="url(#hairGrad)"/>
      <path d="M 146 348 C 156 344 168 346 176 352 L 172 366 C 164 360 154 358 146 362 Z" fill="#7A5849"/>
      <path d="M 152 372 C 144 402 143 436 150 470" fill="none" stroke="#191310" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
      <path d="M 166 374 C 160 406 160 442 166 476" fill="none" stroke="#191310" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
      <path d="M 172 470 C 178 492 176 508 168 518" fill="none" stroke="#2A211C" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
      <!-- ears -->
      <ellipse cx="136" cy="250" rx="14" ry="21" fill="#E3AC85"/>
      <path d="M 132 240 C 127 246 127 256 132 262 C 136 258 137 246 132 240 Z" fill="#C98F68" opacity="0.8"/>
      <ellipse cx="344" cy="250" rx="14" ry="21" fill="#E3AC85"/>
      <path d="M 348 240 C 353 246 353 256 348 262 C 344 258 343 246 348 240 Z" fill="#C98F68" opacity="0.8"/>
      <!-- face -->
      <path d="M 240 112 C 300 112 336 158 336 222 C 336 262 322 300 298 328 C 280 349 260 358 240 358 C 220 358 200 349 182 328 C 158 300 144 262 144 222 C 144 158 180 112 240 112 Z" fill="url(#skinGrad)"/>
      <!-- pale, slightly grey complexion overlay -->
      <ellipse cx="240" cy="252" rx="90" ry="102" fill="#CDCDC5" opacity="0.09"/>
      <!-- forehead shading near hairline -->
      <ellipse cx="240" cy="150" rx="78" ry="26" fill="#DFA980" opacity="0.25"/>
      <!-- temple shadows -->
      <ellipse cx="158" cy="240" rx="12" ry="30" fill="#D69B72" opacity="0.35"/>
      <ellipse cx="322" cy="240" rx="12" ry="30" fill="#D69B72" opacity="0.35"/>
      <!-- cheek hollow shading (unwell) -->
      <ellipse cx="178" cy="284" rx="18" ry="12" fill="#D69B72" opacity="0.3"/>
      <ellipse cx="302" cy="284" rx="18" ry="12" fill="#D69B72" opacity="0.3"/>
      <!-- greyish under-eye circles -->
      <ellipse cx="196" cy="251" rx="15" ry="5.5" fill="#B39482" opacity="0.38"/>
      <ellipse cx="284" cy="251" rx="15" ry="5.5" fill="#B39482" opacity="0.38"/>
      <path d="M 183 249 C 191 254 202 254.5 210 251" fill="none" stroke="#C39374" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
      <path d="M 297 249 C 289 254 278 254.5 270 251" fill="none" stroke="#C39374" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>

      <!-- brows: slightly knitted -->
      <path id="av-browL" d="M 168 213 C 176 205 193 201 208 205 C 215 207 220 210 224 215 C 224.5 217.5 222.5 219.5 220 218.5 C 214 215.5 208 213.5 202 212.5 C 191 210.8 179 212.5 171 217.5 C 168.5 218.5 167 215.5 168 213 Z" fill="#3B2D24"/>
      <path id="av-browR" d="M 312 213 C 304 205 287 201 272 205 C 265 207 260 210 256 215 C 255.5 217.5 257.5 219.5 260 218.5 C 266 215.5 272 213.5 278 212.5 C 289 210.8 301 212.5 309 217.5 C 311.5 218.5 313 215.5 312 213 Z" fill="#3B2D24"/>
