        <path d="M231,270 L230.4,261 M249,270 L249.6,261" stroke="#E7F5EE" stroke-width="1.4" opacity="0.8"/>
        <path d="M221,270 Q196,279 176,266 Q158,252 152,222 Q150,212 151,203" stroke="#8CC7B2" stroke-width="6.5" opacity="0.5"/>
