        <rect x="236.5" y="388" width="7" height="11" rx="3" fill="#E7F5EE" stroke="none" opacity="0.7"/>
        <path d="M240,402 Q236,446 240,492 Q242,526 238,560" stroke="#8CC7B2" stroke-width="6.5" opacity="0.5"/>
        <path d="M240,402 Q236,446 240,492 Q242,526 238,560" stroke="#BFE3D6" stroke-width="4.5" opacity="0.95"/>
