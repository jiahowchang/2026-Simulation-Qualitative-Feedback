      <ellipse cx="240" cy="404" rx="7" ry="4" fill="#D69B72" opacity="0.5"/>

      <!-- upper chest skin visible in gown V-neck -->
      <path d="M196,404 L284,404 L266,476 Q240,490 214,476 Z" fill="#E8B48E"/>
      <path d="M200,424 Q220,434 238,429 M280,424 Q260,434 242,429" stroke="#C98F68" stroke-width="2.4" fill="none" opacity="0.65" stroke-linecap="round"/>
