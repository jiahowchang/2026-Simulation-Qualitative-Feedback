<svg viewBox="0 0 480 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gownBust" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#A9C7E8"/>
      <stop offset="1" stop-color="#86A9CF"/>
    </linearGradient>
    <linearGradient id="scalpSheen" x1="0" y1="0" x2="0" y2="1">
