      <ellipse cx="266" cy="419" rx="10" ry="4" fill="#D69B72" opacity="0.35"/>
      <path d="M240,438 L240,470" stroke="#D69B72" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

