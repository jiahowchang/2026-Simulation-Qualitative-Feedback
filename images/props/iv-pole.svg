<svg viewBox="0 0 360 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8D97A3"/>
      <stop offset="0.28" stop-color="#CBD3DA"/>
      <stop offset="0.5" stop-color="#B9C2CC"/>
      <stop offset="0.8" stop-color="#98A2AE"/>
      <stop offset="1" stop-color="#8D97A3"/>
    </linearGradient>
    <linearGradient id="gBag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2F7FB"/>
      <stop offset="1" stop-color="#E0EBF4"/>
    </linearGradient>
    <linearGradient id="gBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CBD3DA"/>
      <stop offset="0.5" stop-color="#A5AEB9"/>
      <stop offset="1" stop-color="#8D97A3"/>
    </linearGradient>
  </defs>

  <!-- floor shadow -->
  <ellipse cx="180" cy="938" rx="165" ry="28" fill="rgba(0,0,0,0.16)"/>

  <!-- back legs -->
  <path d="M180,862 C152,866 120,872 100,886" fill="none" stroke="#8A94A0" stroke-width="9" stroke-linecap="round"/>
  <path d="M180,860 C152,864 120,870 100,884" fill="none" stroke="#AEB6C0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M180,862 C208,866 240,872 260,886" fill="none" stroke="#8A94A0" stroke-width="9" stroke-linecap="round"/>
  <path d="M180,860 C208,864 240,870 260,884" fill="none" stroke="#AEB6C0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- back casters -->
  <circle cx="100" cy="888" r="4" fill="#8A94A0"/>
  <rect x="90" y="886" width="20" height="14" rx="5" fill="#8A94A0"/>
  <circle cx="98" cy="904" r="10.5" fill="#667080"/>
  <circle cx="98" cy="904" r="5.5" fill="#8D97A3"/>
  <circle cx="98" cy="904" r="2.5" fill="#AEB6C0"/>
  <circle cx="260" cy="888" r="4" fill="#8A94A0"/>
  <rect x="250" y="886" width="20" height="14" rx="5" fill="#8A94A0"/>
  <circle cx="262" cy="904" r="10.5" fill="#667080"/>
  <circle cx="262" cy="904" r="5.5" fill="#8D97A3"/>
  <circle cx="262" cy="904" r="2.5" fill="#AEB6C0"/>

  <!-- hub -->
  <rect x="167" y="840" width="26" height="34" rx="8" fill="url(#gP)"/>
  <ellipse cx="180" cy="841" rx="13" ry="4" fill="#C9D1D9"/>

  <!-- pole -->
  <rect x="175.5" y="46" width="9" height="418" fill="url(#gP)"/>
  <rect x="177.2" y="60" width="2.2" height="392" fill="#FFFFFF" opacity="0.32"/>
  <rect x="172" y="472" width="16" height="376" rx="2" fill="url(#gP)"/>
  <rect x="174.5" y="480" width="3" height="358" fill="#FFFFFF" opacity="0.26"/>
  <!-- height-adjust collar with knob -->
  <rect x="190" y="466" width="9" height="8" fill="#8A94A0"/>
  <circle cx="200" cy="470" r="6.5" fill="#8D97A3"/>
  <circle cx="200" cy="470" r="3" fill="#C6CED6"/>
  <rect x="168" y="456" width="24" height="28" rx="6" fill="url(#gP)"/>
  <rect x="171" y="460" width="4" height="20" fill="#FFFFFF" opacity="0.28"/>

  <!-- top crossbar and hooks -->
  <rect x="134" y="42" width="92" height="7.5" rx="3.75" fill="url(#gBar)"/>
  <circle cx="180" cy="46" r="6" fill="#B9C2CC"/>
  <ellipse cx="178" cy="44" rx="2.6" ry="1.8" fill="#DDE2E8"/>
  <path d="M144 48 v16 a13 13 0 0 1 -26 0 v-8" fill="none" stroke="#8D97A3" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M144 48 v16 a13 13 0 0 1 -26 0 v-8" fill="none" stroke="#C9D1D9" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <path d="M216 48 v16 a13 13 0 0 0 26 0 v-8" fill="none" stroke="#8D97A3" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M216 48 v16 a13 13 0 0 0 26 0 v-8" fill="none" stroke="#C9D1D9" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- front legs -->
  <path d="M180,868 C142,876 78,898 48,920" fill="none" stroke="#8D97A3" stroke-width="10" stroke-linecap="round"/>
  <path d="M180,866 C142,874 78,896 48,918" fill="none" stroke="#C6CED6" stroke-width="3" stroke-linecap="round"/>
  <path d="M180,868 C218,876 282,898 312,920" fill="none" stroke="#8D97A3" stroke-width="10" stroke-linecap="round"/>
  <path d="M180,866 C218,874 282,896 312,918" fill="none" stroke="#C6CED6" stroke-width="3" stroke-linecap="round"/>
  <path d="M180,870 C181,892 183,912 184,932" fill="none" stroke="#99A3AF" stroke-width="11" stroke-linecap="round"/>
  <path d="M178,870 C179,892 181,912 182,930" fill="none" stroke="#C9D1D9" stroke-width="3.5" stroke-linecap="round"/>

  <!-- front casters -->
  <circle cx="48" cy="922" r="5" fill="#8D97A3"/>
  <rect x="36" y="920" width="24" height="18" rx="6" fill="#98A2AE"/>
  <circle cx="44" cy="940" r="13" fill="#6E7885"/>
  <circle cx="44" cy="940" r="7" fill="#9AA3AF"/>
  <circle cx="44" cy="940" r="3" fill="#C6CED6"/>
  <circle cx="312" cy="922" r="5" fill="#8D97A3"/>
  <rect x="300" y="920" width="24" height="18" rx="6" fill="#98A2AE"/>
  <circle cx="316" cy="940" r="13" fill="#6E7885"/>
  <circle cx="316" cy="940" r="7" fill="#9AA3AF"/>
  <circle cx="316" cy="940" r="3" fill="#C6CED6"/>
  <circle cx="184" cy="934" r="5" fill="#8D97A3"/>
  <rect x="172" y="930" width="24" height="20" rx="6" fill="#98A2AE"/>
  <circle cx="184" cy="950" r="14" fill="#6E7885"/>
  <circle cx="184" cy="950" r="7.5" fill="#9AA3AF"/>
  <circle cx="184" cy="950" r="3" fill="#C6CED6"/>

  <!-- IV bag hanging tab (hook shows through the hole) -->
  <path d="M123 68 h16 q8 0 8 8 v16 q0 8 -8 8 h-16 q-8 0 -8 -8 v-16 q0 -8 8 -8 Z M131 75 a7 7 0 1 0 0.01 0 Z" fill="#C7DAE8" fill-rule="evenodd"/>

  <!-- IV bag -->
  <rect x="78" y="96" width="104" height="176" rx="14" fill="url(#gBag)" opacity="0.62"/>
  <!-- fluid (pale blue-white) -->
  <rect x="86" y="150" width="88" height="114" rx="9" fill="#D9EAF6"/>
  <path d="M86,152 Q130,159 174,152" fill="none" stroke="#BBD6EA" stroke-width="3"/>
  <!-- bag seam -->
  <rect x="78" y="96" width="104" height="176" rx="14" fill="none" stroke="#B9CFE0" stroke-width="3"/>
  <!-- graduation ticks -->
  <path d="M163,162 h8 M163,188 h8 M163,214 h8 M163,240 h8" stroke="#AFC9DD" stroke-width="2" fill="none"/>
  <!-- blank label -->
  <rect x="92" y="170" width="66" height="68" rx="5" fill="#FFFFFF"/>
  <rect x="94" y="172" width="62" height="7" rx="2" fill="#1E2761"/>
  <rect x="92" y="231" width="66" height="7" rx="3" fill="#D9E2EA"/>
  <!-- film highlight -->
  <path d="M90,112 q-4,62 2,140" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.35"/>

  <!-- bag ports -->
  <rect x="110" y="270" width="11" height="22" rx="3" fill="#BCD1E1"/>
  <rect x="146" y="270" width="11" height="18" rx="3" fill="#BCD1E1"/>
  <rect x="145" y="286" width="13" height="9" rx="3" fill="#1E2761"/>

  <!-- drip chamber -->
  <rect x="112" y="288" width="9" height="12" fill="#B0C7D9"/>
  <rect x="104" y="296" width="25" height="54" rx="9" fill="#EBF3F9" opacity="0.78"/>
  <rect x="107" y="330" width="19" height="15" rx="4" fill="#D9EAF6"/>
  <ellipse cx="116.5" cy="314" rx="2.5" ry="3.6" fill="#A9C7E8"/>
  <rect x="104" y="296" width="25" height="54" rx="9" fill="none" stroke="#B9CFE0" stroke-width="2.5"/>

  <!-- IV line -->
  <path d="M116,350 C112,420 86,468 94,538 C100,600 194,578 201,648 C205,698 152,712 142,758 C134,800 170,818 206,810" fill="none" stroke="#C2D4E2" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M116,350 C112,420 86,468 94,538 C100,600 194,578 201,648 C205,698 152,712 142,758 C134,800 170,818 206,810" fill="none" stroke="#F4F7FA" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>

  <!-- roller clamp -->
  <g transform="rotate(-6 93 506)">
    <rect x="84" y="488" width="18" height="36" rx="6" fill="#86A9CF"/>
    <circle cx="93" cy="510" r="5.5" fill="#F4F7FA"/>
    <circle cx="93" cy="510" r="2.5" fill="#C2D4E2"/>
  </g>

  <!-- luer connector at line end -->
  <g transform="rotate(-12 206 810)">
    <rect x="203" y="804" width="22" height="12" rx="4" fill="#86A9CF"/>
    <rect x="223" y="806.5" width="6" height="7" rx="2" fill="#A9C7E8"/>
  </g>
</svg>
