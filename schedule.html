<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 擬真訓練場次時間表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8; color: #1a202c; min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #2b6cb0, #3182ce);
      padding: 28px 20px 24px; text-align: center; margin-bottom: 24px;
    }
    .header img { height: 62px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
    .header h1 {
      font-size: 1.45rem; font-weight: 800; color: #fff; line-height: 1.4;
      letter-spacing: 0.01em;
    }
    .header p { font-size: 0.9rem; color: rgba(255,255,255,0.8); margin-top: 6px; }

    /* ── Layout：3-column on desktop, stack on mobile ── */
    .layout {
      max-width: 1400px; margin: 0 auto; padding: 0 16px 60px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }
    .left-col, .right-col { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; max-width: 700px; }
      .left-col, .right-col { position: static; max-height: none; }
    }

    /* ── Panel ── */
    .panel {
      background: #fff; border-radius: 14px; padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .panel-title {
      font-size: 0.95rem; font-weight: 700; color: #2b6cb0;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Progress Panel ── */
    .prog-item {
      border-left: 3px solid #3182ce;
      padding: 8px 10px; margin-bottom: 8px;
      background: #f7fafc; border-radius: 6px;
      cursor: pointer; transition: background 0.15s;
    }
    .prog-item:hover { background: #ebf8ff; }
    .prog-item.past { opacity: 0.55; border-left-color: #cbd5e0; }
    .prog-group { font-weight: 700; font-size: 0.85rem; color: #2d3748; line-height: 1.3; }
    .prog-date { font-size: 0.75rem; color: #718096; margin-top: 2px; }
    .prog-bar-wrap { background: #e2e8f0; border-radius: 999px; height: 6px; margin-top: 6px; overflow: hidden; }
    .prog-bar-fill { height: 100%; background: linear-gradient(90deg, #3182ce, #63b3ed); transition: width 0.4s; }
    .prog-stat { font-size: 0.74rem; color: #4a5568; margin-top: 4px; font-weight: 600; }
    .prog-unfilled { font-size: 0.74rem; color: #c53030; margin-top: 4px; line-height: 1.5; }

    /* ── Calendar ── */
    .cal-month { margin-bottom: 18px; }
    .cal-month-header {
      text-align: center; font-weight: 700; color: #2b6cb0;
      margin-bottom: 8px; font-size: 0.95rem;
    }
    .cal-week {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
      font-size: 0.7rem; color: #a0aec0;
      text-align: center; margin-bottom: 4px; font-weight: 600;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; color: #4a5568; border-radius: 6px;
      position: relative;
    }
    .cal-day.other-month { color: transparent; }
    .cal-day.today { background: #fef5e7; color: #c05621; font-weight: 700; }
    .cal-day.has-session {
      background: #3182ce; color: #fff; font-weight: 600;
      cursor: pointer;
    }
    .cal-day.has-session.today { background: #c05621; }
    .cal-day.has-session:hover { transform: scale(1.1); }
    .cal-day.has-session.past { background: #a0aec0; }
    .cal-legend { font-size: 0.7rem; color: #718096; margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .cal-legend-item { display: flex; align-items: center; gap: 4px; }
    .cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ── Filter Pills ── */
    .filter-wrap {
      display: flex; gap: 8px; flex-wrap: wrap; padding: 0 0 4px;
      margin-bottom: 16px;
    }
    .pill {
      padding: 7px 16px; border-radius: 999px; border: 2px solid #cbd5e0;
      background: #fff; font-size: 0.85rem; font-weight: 600; color: #4a5568;
      cursor: pointer; transition: all 0.18s; white-space: nowrap; user-select: none;
    }
    .pill:hover { border-color: #3182ce; color: #2b6cb0; }
    .pill.active { border-color: #3182ce; background: #3182ce; color: #fff; }

    /* ── Propose Button ── */
    .btn-propose {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px 22px; background: linear-gradient(135deg, #2b6cb0, #3182ce);
      color: #fff; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(49,130,206,0.35); transition: all 0.2s;
    }
    .btn-propose:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(49,130,206,0.45); }
    .btn-propose:active { transform: none; }

    /* ── Section Divider ── */
    .section-label {
      font-size: 0.8rem; font-weight: 700; color: #718096;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 12px; margin-top: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: #e2e8f0;
    }

    /* ── Session Cards ── */
    .session-card {
      background: #fff; border-radius: 14px; padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 12px;
      border-left: 4px solid #3182ce; transition: box-shadow 0.2s;
    }
    .session-card:hover { box-shadow: 0 4px 16px rgba(49,130,206,0.15); }
    .session-card.past { border-left-color: #cbd5e0; opacity: 0.75; }
    .session-card.past .session-group { color: #718096; }
    .session-card.highlight { box-shadow: 0 0 0 3px #3182ce !important; }

    .session-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .session-group { font-size: 1rem; font-weight: 800; color: #2b6cb0; line-height: 1.3; }
    .session-date-badge {
      background: #ebf8ff; color: #2b6cb0; border-radius: 8px;
      padding: 4px 10px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .session-card.past .session-date-badge { background: #f7fafc; color: #a0aec0; }

    .session-info {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
      margin-bottom: 14px; font-size: 0.86rem;
    }
    .info-item { display: flex; align-items: flex-start; gap: 6px; }
    .info-icon { flex-shrink: 0; font-size: 0.9rem; margin-top: 1px; }
    .info-text { color: #4a5568; line-height: 1.5; }
    .info-label { color: #a0aec0; font-size: 0.78rem; }

    .session-note {
      background: #fffbeb; border: 1px solid #fbd38d; border-radius: 8px;
      padding: 8px 12px; font-size: 0.84rem; color: #744210; margin-bottom: 12px; line-height: 1.6;
    }

    .session-actions { display: flex; justify-content: flex-end; }
    .btn-feedback {
      padding: 9px 20px; background: #3182ce; color: #fff; border: none;
      border-radius: 8px; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      text-decoration: none; display: inline-block; transition: background 0.2s;
    }
    .btn-feedback:hover { background: #2b6cb0; }
    .session-card.past .btn-feedback { background: #718096; }

    /* ── Loading / Empty ── */
    .loading { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: 0.85rem; }
    .loading-spinner {
      width: 28px; height: 28px; border: 3px solid #e2e8f0;
      border-top-color: #3182ce; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: 0.85rem; }
    .empty-icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 500; align-items: flex-end; justify-content: center; padding: 0;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px;
      max-height: 92vh; overflow-y: auto; padding: 28px 20px 40px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.18);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle {
      width: 40px; height: 4px; background: #cbd5e0; border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal h2 { font-size: 1.15rem; color: #2b6cb0; margin-bottom: 6px; }
    .modal-desc { font-size: 0.85rem; color: #718096; margin-bottom: 20px; line-height: 1.6; }

    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      display: block; font-weight: 600; font-size: 0.88rem;
      margin-bottom: 5px; color: #4a5568;
    }
    .modal-field input, .modal-field select, .modal-field textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e0; border-radius: 8px;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s; background: #fff;
      font-family: inherit;
    }
    .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #3182ce; }
    .modal-field textarea { min-height: 70px; resize: vertical; }

    .member-input-row {
      display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
    }
    .member-input-row input { flex: 1; min-width: 0; }
    .btn-remove-member {
      background: none; border: 1.5px solid #fc8181; color: #e53e3e;
      border-radius: 6px; width: 32px; height: 32px; cursor: pointer; font-size: 1rem;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .btn-add-member {
      background: none; border: 1.5px dashed #cbd5e0; color: #718096;
      border-radius: 8px; padding: 9px; width: 100%; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s; margin-top: 4px;
    }
    .btn-add-member:hover { border-color: #3182ce; color: #2b6cb0; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 13px; background: #f7fafc; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #4a5568;
    }
    .btn-confirm {
      flex: 2; padding: 13px; background: #3182ce; color: #fff; border: none;
      border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-confirm:hover { background: #2b6cb0; }
    .btn-confirm:disabled { background: #a0aec0; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 0.9rem;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #c6f6d5; color: #276749; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .toast.error   { background: #fed7d7; color: #822727; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

    @media (max-width: 480px) {
      .session-info { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.25rem; }
      .modal { padding: 24px 16px 36px; }
    }
  </style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="新竹台大分院">
  <h1>2026 擬真訓練<br>場次時間表</h1>
  <p>Simulation Training Schedule</p>
</div>

<div class="layout">

  <!-- ══════════ LEFT：質性回饋進度 ══════════ -->
  <div class="left-col">
    <div class="panel">
      <div class="panel-title">📊 質性回饋進度</div>
      <div id="progressPanel">
        <div class="loading"><div class="loading-spinner"></div>載入中…</div>
      </div>
    </div>
  </div>

  <!-- ══════════ CENTER：場次時間表 ══════════ -->
  <div class="main-col">
    <div class="filter-wrap" id="filterWrap">
      <button class="pill active" onclick="filterGroup('', this)">全部</button>
      <button class="pill" onclick="filterGroup('新竹新人組', this)">新竹新人組</button>
      <button class="pill" onclick="filterGroup('新竹急重症照護組', this)">新竹急重症照護組</button>
      <button class="pill" onclick="filterGroup('新竹新生兒組', this)">新竹新生兒組</button>
      <button class="pill" onclick="filterGroup('生醫急重症照護組', this)">生醫急重症照護組</button>
      <button class="pill" onclick="filterGroup('生醫新生兒組', this)">生醫新生兒組</button>
      <button class="pill" onclick="filterGroup('生醫醫事放射組', this)">生醫醫事放射組</button>
      <button class="pill" onclick="filterGroup('桃竹苗競賽生醫宋仙女組', this)">桃竹苗競賽生醫宋仙女組</button>
      <button class="pill" onclick="filterGroup('桃竹苗競賽生醫范特C組', this)">桃竹苗競賽生醫范特C組</button>
      <button class="pill" onclick="filterGroup('桃竹苗競賽院內其他團隊', this)">桃竹苗競賽院內其他團隊</button>
      <button class="pill" onclick="filterGroup('桃竹苗競賽院外其他團隊', this)">桃竹苗競賽院外其他團隊</button>
    </div>

    <button class="btn-propose" onclick="openProposeModal()">
      📅 預約練習時間　→
    </button>

    <div id="scheduleContent">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>載入場次中…</div>
      </div>
    </div>
  </div>

  <!-- ══════════ RIGHT：月曆 ══════════ -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-title">📅 預約排程</div>
      <div id="calendarPanel">
        <div class="loading"><div class="loading-spinner"></div>載入中…</div>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#3182ce;"></div>即將到來</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#a0aec0;"></div>已完成</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fef5e7;border:1px solid #c05621;"></div>今日</div>
      </div>
    </div>
  </div>

</div>

<!-- ══════════ PROPOSE SESSION MODAL ══════════ -->
<div class="modal-overlay" id="proposeModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📅 預約練習時間</h2>
    <p class="modal-desc">填寫後系統將自動發送通知信給所有隊員及講師。</p>

    <div class="modal-field">
      <label>組別 *</label>
      <select id="pGroup" onchange="loadGroupMembers()">
        <option value="">-- 請選擇組別 --</option>
        <option>新竹新人組</option>
        <option>新竹急重症照護組</option>
        <option>新竹新生兒組</option>
        <option>生醫急重症照護組</option>
        <option>生醫新生兒組</option>
        <option>生醫醫事放射組</option>
        <option>桃竹苗競賽生醫宋仙女組</option>
        <option>桃竹苗競賽生醫范特C組</option>
        <option>桃竹苗競賽院內其他團隊</option>
        <option>桃竹苗競賽院外其他團隊</option>
      </select>
    </div>
    <div class="modal-field">
      <label>日期 *</label>
      <input type="date" id="pDate">
    </div>
    <div class="modal-field">
      <label>時間區間 *</label>
      <input type="text" id="pTime" placeholder="例：13:00–15:00">
    </div>
    <div class="modal-field">
      <label>地點</label>
      <input type="text" id="pLocation" placeholder="例:急診教育訓練室">
    </div>
    <div class="modal-field">
      <label>備注</label>
      <textarea id="pNote" placeholder="其他說明（選填）"></textarea>
    </div>

    <div class="modal-field">
      <label>通知講師／助教（選填）</label>
      <p style="font-size:0.8rem;color:#718096;margin-bottom:8px;">從名冊選擇或手動新增，名冊由管理員維護</p>
      <select id="pStaffPicker" onchange="addStaffFromList(this)" style="margin-bottom:8px;">
        <option value="">📋 從名冊選擇講師／助教</option>
      </select>
      <div id="pStaffRows"></div>
      <button class="btn-add-member" onclick="addPStaffRow()">＋ 手動新增</button>
    </div>

    <div class="modal-field">
      <label>隊員名單（姓名 ＋ Email）</label>
      <div id="pMemberRows"></div>
      <button class="btn-add-member" onclick="addPMemberRow()">＋ 新增隊員</button>
    </div>

    <div class="modal-field">
      <label>你的姓名 *</label>
      <input type="text" id="pSubmitterName" placeholder="填寫者姓名">
    </div>
    <div class="modal-field">
      <label>你的 Email *</label>
      <input type="email" id="pSubmitterEmail" placeholder="填寫者 Email（也會收到通知）">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProposeModal()">取消</button>
      <button class="btn-confirm" id="proposeSubmitBtn" onclick="submitPropose()">送出預約 →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxry8msOCgkK26qbveQbxpZ-TTXp1y1Ps3kjHBz6QmshndyVSpFduoZdgk9UwQx4GoT/exec';
  var allSessions = [];
  var progressData = [];
  var currentGroup = '';
  var cbIndex = 0;

  function jsonp(params, cb) {
    var name = '__cb' + (cbIndex++);
    var s = document.createElement('script');
    window[name] = function(data) {
      delete window[name];
      if (document.head.contains(s)) document.head.removeChild(s);
      cb(null, data);
    };
    params.callback = name;
    var qs = Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    s.src = GAS_URL + '?' + qs;
    s.onerror = function() {
      delete window[name];
      if (document.head.contains(s)) document.head.removeChild(s);
      cb(new Error('JSONP error'));
    };
    document.head.appendChild(s);
  }

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function pad2(n) { return n < 10 ? '0' + n : '' + n; }

  /* ── Toast ── */
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'success');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3500);
  }

  /* ── Filter ── */
  function filterGroup(group, btn) {
    currentGroup = group;
    document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
    btn.classList.add('active');
    renderSchedule();
  }

  function parseDate(d) {
    if (!d) return null;
    var parts = d.split('-');
    if (parts.length === 3) return new Date(parts[0], parts[1] - 1, parts[2]);
    return new Date(d);
  }

  function renderSchedule() {
    var el = document.getElementById('scheduleContent');
    var today = new Date(); today.setHours(0,0,0,0);

    var filtered = allSessions.filter(function(s) {
      return !currentGroup || s.group === currentGroup;
    });

    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>目前無場次資料</div></div>';
      return;
    }

    var upcoming = [], past = [];
    filtered.forEach(function(s) {
      var d = parseDate(s.date);
      if (d && d < today) past.push(s);
      else upcoming.push(s);
    });

    upcoming.sort(function(a, b) { return (parseDate(a.date) || 0) - (parseDate(b.date) || 0); });
    past.sort(function(a, b) { return (parseDate(b.date) || 0) - (parseDate(a.date) || 0); });

    var html = '';
    if (upcoming.length) {
      html += '<div class="section-label">即將到來</div>';
      upcoming.forEach(function(s) { html += buildCard(s, false); });
    }
    if (past.length) {
      html += '<div class="section-label" style="margin-top:24px;">過去場次</div>';
      past.forEach(function(s) { html += buildCard(s, true); });
    }

    el.innerHTML = html;
  }

  function buildCard(s, isPast) {
    var cls = 'session-card' + (isPast ? ' past' : '');
    var dateText = s.date || '';
    if (s.time) dateText += ' ' + s.time;

    var infoItems = '';
    if (s.location) infoItems += infoItem('📍', '地點', s.location);
    infoItems += infoItem('👨‍🏫', '教練', s.coach || '待定');
    infoItems += infoItem('🧑‍💼', '助教', s.ta   || '待定');
    infoItems += infoItem('🔧', '值日生', s.duty  || '待定');

    var membersHtml = '';
    try {
      var mems = typeof s.members === 'string' ? JSON.parse(s.members) : (s.members || []);
      var names = mems.map(function(m){ return m.name; }).filter(Boolean);
      if (!names.length && GROUP_MEMBERS[s.group]) {
        names = GROUP_MEMBERS[s.group].map(function(m){ return m.name; }).filter(Boolean);
      }
      if (names.length) {
        membersHtml = '<div style="margin-bottom:12px;font-size:0.83rem;color:#4a5568;">' +
          '<span style="color:#a0aec0;margin-right:6px;">👥 隊員</span>' +
          names.map(function(n){ return '<span style="display:inline-block;background:#ebf8ff;color:#2b6cb0;border-radius:6px;padding:2px 8px;margin:2px 3px 2px 0;">' + esc(n) + '</span>'; }).join('') +
        '</div>';
      }
    } catch(e) {}

    var noteHtml = s.note ? '<div class="session-note">📝 ' + esc(s.note) + '</div>' : '';
    var actionHtml =
      '<div class="session-actions">' +
        '<a href="simulation.html" class="btn-feedback">填寫回饋 →</a>' +
      '</div>';

    return '<div class="' + cls + '" data-sid="' + esc(s.session_id || '') + '" data-date="' + esc(s.date || '') + '">' +
      '<div class="session-top">' +
        '<div class="session-group">' + esc(s.group) + '</div>' +
        '<div class="session-date-badge">' + esc(dateText) + '</div>' +
      '</div>' +
      (infoItems ? '<div class="session-info">' + infoItems + '</div>' : '') +
      membersHtml +
      noteHtml +
      actionHtml +
    '</div>';
  }

  function infoItem(icon, label, text) {
    return '<div class="info-item">' +
      '<span class="info-icon">' + icon + '</span>' +
      '<div><div class="info-label">' + esc(label) + '</div><div class="info-text">' + esc(text) + '</div></div>' +
    '</div>';
  }

  /* ══════════ Progress Panel ══════════ */
  /* 只顯示「已完成」且「尚未全部填寫」的場次（未到的場次不列出，全部填完的也不列出） */
  function renderProgressPanel() {
    var el = document.getElementById('progressPanel');
    var today = new Date(); today.setHours(0,0,0,0);

    var pending = progressData.filter(function(s) {
      var d = parseDate(s.date);
      if (!d || d >= today) return false;            // 還沒進行的不顯示
      if (!s.total) return false;                    // 無成員名單的不顯示
      if (s.filled >= s.total) return false;         // 全部已填的不顯示
      return true;
    });
    // 由近到遠
    pending.sort(function(a,b){ return (parseDate(b.date) || 0) - (parseDate(a.date) || 0); });

    if (pending.length === 0) {
      el.innerHTML = '<div class="empty" style="padding:20px;">🎉 沒有待填寫的場次</div>';
      return;
    }

    var html = '';
    pending.forEach(function(s) {
      var pct = s.total > 0 ? Math.round(s.filled / s.total * 100) : 0;
      var unfilled = (s.members || []).filter(function(m) { return !m.filled; }).map(function(m) { return m.name; }).filter(Boolean);
      var dateStr = (s.date || '').slice(5).replace('-', '/') + (s.time ? ' ' + s.time : '');
      html += '<div class="prog-item" onclick="jumpToSession(\'' + esc(s.session_id || '') + '\',\'' + esc(s.date || '') + '\')">' +
        '<div class="prog-group">' + esc(s.group) + '</div>' +
        '<div class="prog-date">' + esc(dateStr) + '</div>' +
        '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="prog-stat">' + s.filled + '/' + s.total + ' 已填 (' + pct + '%)</div>' +
        (unfilled.length ? '<div class="prog-unfilled">⚠️ 未填：' + esc(unfilled.join('、')) + '</div>' : '') +
      '</div>';
    });
    el.innerHTML = html;
  }

  function jumpToSession(sid, dateStr) {
    var card = sid ? document.querySelector('.session-card[data-sid="' + sid + '"]') : null;
    if (!card && dateStr) card = document.querySelector('.session-card[data-date="' + dateStr + '"]');
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('highlight');
    setTimeout(function() { card.classList.remove('highlight'); }, 2000);
  }

  /* ══════════ Calendar ══════════ */
  function renderCalendar() {
    var el = document.getElementById('calendarPanel');
    var now = new Date();
    var month1 = new Date(now.getFullYear(), now.getMonth(), 1);
    var month2 = new Date(now.getFullYear(), now.getMonth() + 1, 1);

    var sessionsByDate = {};
    allSessions.forEach(function(s) {
      if (!s.date) return;
      if (!sessionsByDate[s.date]) sessionsByDate[s.date] = [];
      sessionsByDate[s.date].push(s);
    });

    el.innerHTML = renderMonth(month1, sessionsByDate) + renderMonth(month2, sessionsByDate);
  }

  function renderMonth(monthStart, sessionsByDate) {
    var year = monthStart.getFullYear();
    var month = monthStart.getMonth();
    var monthName = year + ' 年 ' + (month + 1) + ' 月';

    var firstDay = new Date(year, month, 1).getDay();
    var lastDate = new Date(year, month + 1, 0).getDate();
    var today = new Date(); today.setHours(0,0,0,0);

    var html = '<div class="cal-month">';
    html += '<div class="cal-month-header">' + monthName + '</div>';
    html += '<div class="cal-week"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>';
    html += '<div class="cal-grid">';

    for (var i = 0; i < firstDay; i++) {
      html += '<div class="cal-day other-month"></div>';
    }

    for (var d = 1; d <= lastDate; d++) {
      var dateStr = year + '-' + pad2(month + 1) + '-' + pad2(d);
      var hasSessions = !!sessionsByDate[dateStr];
      var thisDate = new Date(year, month, d);
      var isPast = thisDate < today;
      var isToday = thisDate.getTime() === today.getTime();

      var classes = 'cal-day';
      if (hasSessions) classes += ' has-session';
      if (hasSessions && isPast) classes += ' past';
      if (isToday) classes += ' today';

      var tooltip = '';
      if (hasSessions) {
        tooltip = sessionsByDate[dateStr].map(function(s){
          return s.group + (s.time ? ' ' + s.time : '');
        }).join('\n');
      }
      var click = hasSessions ? ' onclick="jumpToSession(\'\',\'' + dateStr + '\')"' : '';
      html += '<div class="' + classes + '"' + click + ' title="' + esc(tooltip) + '">' + d + '</div>';
    }

    html += '</div></div>';
    return html;
  }

  /* ── Group Members 自動帶入 ── */
  var GROUP_MEMBERS = {
    '新竹新人組': [],
    '新竹急重症照護組': [],
    '新竹新生兒組': [],
    '生醫急重症照護組': [],
    '生醫新生兒組': [],
    '生醫醫事放射組': [],
    '桃竹苗競賽生醫宋仙女組': [],
    '桃竹苗競賽生醫范特C組': [],
    '桃竹苗競賽院內其他團隊': [],
    '桃竹苗競賽院外其他團隊': []
  };

  function loadGroupMembers() {
    var group = document.getElementById('pGroup').value;
    var container = document.getElementById('pMemberRows');
    container.innerHTML = '';
    var members = GROUP_MEMBERS[group] || [];
    if (members.length > 0) {
      members.forEach(function(m) {
        var row = document.createElement('div');
        row.className = 'member-input-row';
        row.innerHTML =
          '<input type="text" placeholder="姓名" value="' + esc(m.name||'') + '">' +
          '<input type="email" placeholder="Email" value="' + esc(m.email||'') + '">' +
          '<button class="btn-remove-member" onclick="this.parentNode.remove()">✕</button>';
        container.appendChild(row);
      });
    } else {
      addPMemberRow();
    }
  }

  /* ── Propose Modal ── */
  function openProposeModal() {
    ['pGroup','pDate','pTime','pLocation','pNote','pSubmitterName','pSubmitterEmail'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('pStaffRows').innerHTML = '';
    document.getElementById('pMemberRows').innerHTML = '';
    addPMemberRow();
    addPMemberRow();
    document.getElementById('proposeModal').classList.add('show');
  }

  function closeProposeModal() {
    document.getElementById('proposeModal').classList.remove('show');
  }

  function addPStaffRow() {
    var row = document.createElement('div');
    row.className = 'member-input-row';
    row.innerHTML =
      '<input type="text" placeholder="姓名">' +
      '<input type="email" placeholder="Email">' +
      '<button class="btn-remove-member" onclick="this.parentNode.remove()">✕</button>';
    document.getElementById('pStaffRows').appendChild(row);
  }

  function addPMemberRow() {
    var row = document.createElement('div');
    row.className = 'member-input-row';
    row.innerHTML =
      '<input type="text" placeholder="姓名">' +
      '<input type="email" placeholder="Email">' +
      '<button class="btn-remove-member" onclick="this.parentNode.remove()">✕</button>';
    document.getElementById('pMemberRows').appendChild(row);
  }

  function submitPropose() {
    var group   = document.getElementById('pGroup').value.trim();
    var date    = document.getElementById('pDate').value;
    var time    = document.getElementById('pTime').value.trim();
    var sName   = document.getElementById('pSubmitterName').value.trim();
    var sEmail  = document.getElementById('pSubmitterEmail').value.trim();

    if (!group)  { showToast('請選擇組別', 'error'); return; }
    if (!date)   { showToast('請選擇日期', 'error'); return; }
    if (!time)   { showToast('請輸入時間區間', 'error'); return; }
    if (!sName)  { showToast('請輸入你的姓名', 'error'); return; }
    if (!sEmail || !sEmail.includes('@')) { showToast('請輸入有效的 Email', 'error'); return; }

    var staff = [];
    document.querySelectorAll('#pStaffRows .member-input-row').forEach(function(row) {
      var inputs = row.querySelectorAll('input');
      var n = inputs[0].value.trim();
      var e = inputs[1].value.trim();
      if (n || e) staff.push({ name: n, email: e });
    });

    var members = [];
    document.querySelectorAll('#pMemberRows .member-input-row').forEach(function(row) {
      var inputs = row.querySelectorAll('input');
      var n = inputs[0].value.trim();
      var e = inputs[1].value.trim();
      if (n || e) members.push({ name: n, email: e });
    });

    var btn = document.getElementById('proposeSubmitBtn');
    btn.disabled = true; btn.textContent = '送出中…';

    jsonp({
      action: 'proposeSession',
      group: group,
      date: date,
      time: time,
      location: document.getElementById('pLocation').value.trim(),
      note: document.getElementById('pNote').value.trim(),
      submitter_name: sName,
      submitter_email: sEmail,
      notify_staff: JSON.stringify(staff),
      members: JSON.stringify(members)
    }, function(err, data) {
      btn.disabled = false; btn.textContent = '送出預約 →';
      if (err || (data && data.error)) {
        showToast('送出失敗，請稍後再試', 'error');
      } else {
        closeProposeModal();
        showToast('✅ 預約完成！通知信已發送給所有隊員', 'success');
        loadAll();
      }
    });
  }

  /* ── Close modal on backdrop click ── */
  document.getElementById('proposeModal').addEventListener('click', function(e) {
    if (e.target === this) closeProposeModal();
  });

  /* ── Load group members on page load（動態覆蓋預設值）── */
  jsonp({ action: 'getGroupMembers' }, function(err, data) {
    if (!err && data && data.groups) {
      GROUP_MEMBERS = data.groups;
    }
  });

  /* ── Load staff list 講師/助教名冊 ── */
  var STAFF_LIST = [];
  jsonp({ action: 'getStaffList' }, function(err, data) {
    STAFF_LIST = (data && data.staff) || [];
    var sel = document.getElementById('pStaffPicker');
    if (sel) {
      var html = '<option value="">📋 從名冊選擇講師／助教</option>';
      STAFF_LIST.forEach(function(s, i) {
        var label = s.name + (s.role ? ' (' + s.role + ')' : '') + (s.campus ? ' · ' + s.campus : '');
        html += '<option value="' + i + '">' + esc(label) + '</option>';
      });
      sel.innerHTML = html;
    }
  });

  function addStaffFromList(select) {
    var idx = parseInt(select.value);
    if (isNaN(idx)) return;
    var s = STAFF_LIST[idx];
    if (!s) return;
    var row = document.createElement('div');
    row.className = 'member-input-row';
    row.innerHTML =
      '<input type="text" placeholder="姓名" value="' + esc(s.name||'') + '">' +
      '<input type="email" placeholder="Email" value="' + esc(s.email||'') + '">' +
      '<button class="btn-remove-member" onclick="this.parentNode.remove()">✕</button>';
    document.getElementById('pStaffRows').appendChild(row);
    select.value = '';
  }

  /* ══════════ Load All Data ══════════ */
  function loadAll() {
    // Sessions
    jsonp({ action: 'getPublicSchedule' }, function(err, data) {
      if (err || !data || data.error) {
        document.getElementById('scheduleContent').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div><div>載入失敗，請重新整理頁面</div></div>';
      } else {
        allSessions = data.sessions || [];
        renderSchedule();
        renderCalendar();
      }
    });

    // Progress
    jsonp({ action: 'getPublicProgress' }, function(err, data) {
      if (err || !data || data.error) {
        document.getElementById('progressPanel').innerHTML = '<div class="empty" style="padding:20px;">無法載入進度</div>';
      } else {
        progressData = data.sessions || [];
        renderProgressPanel();
      }
    });
  }

  loadAll();
</script>
</body>
</html>
